<!DOCTYPE html>
<html lang="en">

<link rel="preconnect" href="https://fonts.googleapis.com" />

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Public Sans', system-ui, sans-serif;
    background: #0E1320;
    color: #0E1320;
  }
  [style*="Publico"] { font-family: 'Source Serif 4', Georgia, serif !important; }
  [style*="Neue Haas Grotesk"] { font-family: 'Inter Tight', system-ui, sans-serif !important; }
  #root { display: flex; justify-content: center; min-height: 100vh; background: #0E1320; }
  #stage { background: #F4ECD8; box-shadow: 0 30px 80px rgba(0,0,0,.5); width: 100%; flex-shrink: 0; }

  /* Card grid items must allow shrinking below their min-content so the
     auto-fit minmax() track can actually compress the chart canvas with

     (≈ min-content) and the chart stops shrinking. */
  .at-card { min-width: 0; }

  /* Responsive overrides — !important is needed because the React tree uses inline styles. */
  @media (max-width: 960px) {

    .at-card { border-right: none !important; }
    .at-range-row { flex-wrap: wrap !important; }

<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data/app_data.js"></script>
<script src="data/states_index.js"></script>

<script type="text/babel" data-presets="react">
(function() {
// ── Shared utilities ─────────────────────────────────────────────────────────
const ESP = {
  warmNavy:  '#1B2A4E',
  warmRed:   '#E04E39',
  beige:     '#F4ECD8',
  ink:       '#0E1320',
  paper:     '#FBF7EE',
  mute:      '#6B6E78',
  softMute:  '#9A9CA3',
  green:     '#2E7D5B',
};

// Format helpers. Percents get one decimal place (comms request: easier to
// read on charts); dollars keep cents only when small.
function fmtVal(val, units = '') {
  if (units.includes('%')) return val.toFixed(1) + '%';
  if (units.includes('Billions')) return '$' + val.toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + 'B';
  if (units.includes('$') || units.toLowerCase().includes('gallon') || units.toLowerCase().includes('hour')) {
    return Math.abs(val) >= 1000
      ? '$' + val.toLocaleString(undefined, { maximumFractionDigits: 0 })
      : '$' + val.toFixed(2);
  }
  if (units.includes('Thousands')) return Math.round(val).toLocaleString();
  return val.toFixed(1);
}

// The three message anchors plus a short and a long window. "Pre-pandemic"
// is December 2019, not early 2020 — anchoring at 2020 bakes the COVID
// crash into the baseline (gas cratered in April 2020) and produces
// comparisons that don't survive scrutiny.
const ANCHORS = [
  { id: '1y',   label: '1 Year',         phrase: 'over the past year' },
  { id: '2025', label: 'Since Jan 2025', phrase: 'since Jan 2025' },
  { id: '2019', label: 'Pre-Pandemic',   phrase: 'since Dec 2019' },
  { id: '2000', label: 'Since 2000',     phrase: 'since 2000' },
  { id: 'max',  label: 'Max',            phrase: 'all-time' },
];
function anchorById(id) { return ANCHORS.find(a => a.id === id) || ANCHORS[1]; }
function anchorDate(id, data) {
  if (id === '1y')  { const d = new Date(); d.setFullYear(d.getFullYear() - 1); return d.toISOString().slice(0, 10); }
  if (id === '2025') return '2025-01-01';
  if (id === '2019') return '2019-12-01';
  if (id === '2000') return '2000-01-01';
  return (data && data.length) ? data[0].date : '1900-01-01';
}

// Render the card to a branded PNG by drawing directly to a canvas.
// We avoid html-to-image / DOM-cloning approaches because they were
// producing blank captures (font fallbacks not surviving the clone,
// data-URL <img> elements not decoding before snapshot, foreignObject
// CORS quirks). Drawing the chart canvas + text on a fresh canvas is
// deterministic and needs no external library.
async function downloadCardAsPNG({
  chartCanvas, item, accent, headlineText, changeText, changeColor, rangeLabel,
}) {
  if (document.fonts && document.fonts.ready) {
    try { await document.fonts.ready; } catch (e) {}
  }

  // 2x for retina-grade output; final PNG is 1440 × 1080.
  const SCALE = 2;
  const W = 1440, H = 1080;
  const canvas = document.createElement('canvas');
  canvas.width  = W * SCALE;
  canvas.height = H * SCALE;
  const ctx = canvas.getContext('2d');
  ctx.scale(SCALE, SCALE);
  ctx.textBaseline = 'alphabetic';

  const PAPER = '#FBF7EE';
  const INK   = '#0E1320';
  const NAVY  = '#1B2A4E';
  const MUTE  = '#6B6E78';
  const SERIF   = '"Source Serif 4", Georgia, serif';
  const DISPLAY = '"Inter Tight", system-ui, sans-serif';

  // Background
  ctx.fillStyle = PAPER;
  ctx.fillRect(0, 0, W, H);

  // ── Header band ─────────────────────────────────────────────────────────
  const padX = 80;

  // Logo box ("E")
  ctx.fillStyle = NAVY;
  ctx.fillRect(padX, 80, 56, 56);
  ctx.fillStyle = PAPER;
  ctx.font = `600 36px ${SERIF}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('E', padX + 28, 80 + 30);
  ctx.textBaseline = 'alphabetic';

  // Brand wordmark
  ctx.textAlign = 'left';
  ctx.fillStyle = NAVY;
  ctx.font = `700 28px ${DISPLAY}`;
  ctx.fillText('Economic Security Project', padX + 76, 110);
  ctx.fillStyle = MUTE;
  ctx.font = `600 14px ${DISPLAY}`;
  ctx.fillText('THE AFFORDABILITY TRACKER', padX + 76, 134);

  // Date (right side)
  ctx.textAlign = 'right';
  ctx.fillStyle = MUTE;
  ctx.font = `600 14px ${DISPLAY}`;
  const today = new Date().toLocaleDateString('en-US', {
    month: 'long', day: 'numeric', year: 'numeric',
  }).toUpperCase();
  ctx.fillText(today, W - padX, 134);

  // Header divider
  ctx.strokeStyle = 'rgba(27,42,78,.18)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(padX, 180);
  ctx.lineTo(W - padX, 180);
  ctx.stroke();

  // ── Card area ───────────────────────────────────────────────────────────
  const cardTop = 220;

  // Top accent bar (brand color of this series)
  ctx.fillStyle = accent;
  ctx.fillRect(padX, cardTop, W - padX * 2, 4);

  // Eyebrow — item.eyebrow (state name) wins over the category label
  const eyebrow = (item.eyebrow || categoryLabel(item.category)).toUpperCase();
  ctx.textAlign = 'left';
  ctx.fillStyle = accent;
  ctx.font = `700 18px ${DISPLAY}`;
  ctx.fillText(eyebrow, padX, cardTop + 50);

  // Title (auto-shrink if it would collide with the right-side headline)
  const headlineRightWidth = (() => {
    ctx.font = `500 76px ${SERIF}`;
    return ctx.measureText(headlineText).width;
  })();
  const titleMaxWidth = (W - padX * 2) - headlineRightWidth - 60;
  let titleSize = 56;
  ctx.fillStyle = INK;
  for (; titleSize >= 32; titleSize -= 2) {
    ctx.font = `500 ${titleSize}px ${SERIF}`;
    if (ctx.measureText(item.label).width <= titleMaxWidth) break;
  }
  ctx.fillText(item.label, padX, cardTop + 110);

  // Subtitle
  if (item.subtitle) {
    ctx.fillStyle = MUTE;
    ctx.font = `italic 22px ${SERIF}`;
    ctx.fillText(item.subtitle, padX, cardTop + 145);
  }

  // Headline value (right side)
  ctx.textAlign = 'right';
  ctx.fillStyle = INK;
  ctx.font = `500 76px ${SERIF}`;
  ctx.fillText(headlineText, W - padX, cardTop + 110);

  // Change line under headline
  ctx.fillStyle = changeColor || accent;
  ctx.font = `700 22px ${DISPLAY}`;
  ctx.fillText(changeText, W - padX, cardTop + 145);

  // ── Chart ───────────────────────────────────────────────────────────────
  if (chartCanvas) {
    let chartUrl = null;
    try { chartUrl = chartCanvas.toDataURL('image/png'); } catch (e) {}
    if (chartUrl) {
      const img = new Image();
      await new Promise((resolve) => {
        img.onload = resolve;
        img.onerror = resolve; // never block the export on a chart fail
        img.src = chartUrl;
      });
      const chartX = padX, chartY = cardTop + 200;
      const chartW = W - padX * 2, chartH = 540;
      ctx.drawImage(img, chartX, chartY, chartW, chartH);
    }
  }

  // ── Footer ──────────────────────────────────────────────────────────────
  const footerY = H - 50;
  ctx.strokeStyle = 'rgba(27,42,78,.12)';
  ctx.beginPath();
  ctx.moveTo(padX, footerY - 28);
  ctx.lineTo(W - padX, footerY - 28);
  ctx.stroke();

  ctx.fillStyle = MUTE;
  ctx.font = `600 13px ${DISPLAY}`;
  ctx.textAlign = 'left';
  ctx.fillText('ECONOMICSECURITYPROJECT.ORG', padX, footerY);
  ctx.textAlign = 'right';
  ctx.fillText(item.fred_id ? `SOURCE · FRED · ${item.fred_id}` : `SOURCE · ${item.source_note || 'DERIVED'}`, W - padX, footerY);

  // Trigger download
  await new Promise((resolve) => {
    canvas.toBlob((blob) => {
      if (!blob) return resolve();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${item.id}-${item.fred_id || 'derived'}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      resolve();
    }, 'image/png');
  });
}

function downloadCSV(item) {
  const header = 'date,value,units\n';
  const units = (item.units || '').replace(/"/g, '""');
  const body = item.data.map(r => `${r.date},${r.value},"${units}"`).join('\n');
  const sourceLine = item.fred_id
    ? `# ${item.label} — FRED ${item.fred_id}\n# Source: https://fred.stlouisfed.org/series/${item.fred_id}\n`
    : `# ${item.label} — ${item.source_note || 'Derived from public data'}\n`;
  const csv = `${sourceLine}${header}${body}\n`;
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${item.id}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function fmtDate(dateInput, opts) {
  // Accept either an ISO date string ("2024-01-15") or a numeric timestamp (ms),
  // since Chart.js tooltip callbacks pass parsed.x as a number.
  const d = typeof dateInput === 'number'
    ? new Date(dateInput)
    : new Date(dateInput + 'T12:00:00');
  return d.toLocaleDateString('en-US', opts || { year: 'numeric', month: 'short' });
}

function pctChange(data, fromDate) {
  // Find value at-or-before fromDate; latest is last
  if (!data || data.length < 2) return null;
  const latest = data[data.length - 1].value;
  const cutoff = new Date(fromDate);
  let prior = null;
  for (let i = 0; i < data.length; i++) {
    if (new Date(data[i].date) <= cutoff) prior = data[i].value;
    else break;
  }
  if (prior == null || prior === 0) return null;
  return ((latest - prior) / prior) * 100;
}

function valueAt(data, dateStr) {
  // Last value on or before dateStr
  if (!data || !data.length) return null;
  const cutoff = new Date(dateStr);
  let v = null;
  for (let i = 0; i < data.length; i++) {
    if (new Date(data[i].date) <= cutoff) v = data[i].value;
    else break;
  }
  return v;
}

function sliceFrom(data, fromDateStr) {
  const cutoff = new Date(fromDateStr);
  return data.filter(d => new Date(d.date) >= cutoff);
}

// Build an SVG line path (used by the compare-view sparklines)
function linePath(points) {
  if (!points.length) return '';
  return points.map((p, i) => (i === 0 ? `M${p.x.toFixed(1)},${p.y.toFixed(1)}` : `L${p.x.toFixed(1)},${p.y.toFixed(1)}`)).join(' ');
}

function toPoints(data, w, h, opts = {}) {
  if (!data || data.length === 0) return [];
  const pad = opts.pad || 3;
  const vals = data.map(d => d.value);
  const min = opts.min ?? Math.min(...vals);
  const max = opts.max ?? Math.max(...vals);
  const range = max - min || 1;
  return data.map((d, i) => ({
    x: (i / (data.length - 1 || 1)) * w,
    y: h - pad - ((d.value - min) / range) * (h - pad * 2),
    v: d.value,
    date: d.date,
  }));
}

// Hours of work needed at avg hourly earnings to afford X
function hoursToAfford(price, wage) {
  if (!wage) return null;
  return price / wage;
}

// Convert a CPI level into a real-dollar price (illustrative anchor)
const REFERENCE_PRICES = {
  // Approx avg US weekly grocery bill for a family of 4 in 2025 ≈ $290 (USDA moderate plan, scaled)
  groceriesWeekly2025: 290,
  // Median US rent 2025 ≈ $1,540
  rentMonthly2025: 1540,
};

// For a CPI series, scale a reference price by the ratio of CPI(date) / CPI(2025-01)
function scaleByCPI(series, date, refPrice, anchorDate = '2025-01-01') {
  const at = valueAt(series, date);
  const anchor = valueAt(series, anchorDate);
  if (!at || !anchor) return null;
  return refPrice * (at / anchor);
}

const CATEGORY_LABELS = {
  labor: 'Work & Wages', daily: 'Daily', groceries: 'Groceries', big: 'Big-ticket',
  debt: 'Debt',
};
function categoryLabel(category) {
  return CATEGORY_LABELS[category] || 'Big-ticket';
}

// Press-release-ready sentence for the "Copy fact" button. Composes the two
// message anchors (Jan 2025 and pre-pandemic) plus the level for dollar
// series, and always names the source.
function buildFactText(item, opts = {}) {
  const name = opts.factLabel || item.label;
  const isDollar = (item.units || '').includes('$') || (item.units || '').toLowerCase().includes('gallon');
  const b25 = pctChange(item.data, '2025-01-01');
  const b19 = pctChange(item.data, '2019-12-01');
  const dir = (v) => v >= 0 ? 'up' : 'down';
  const clauses = [];
  if (b25 != null) clauses.push(`${dir(b25)} ${Math.abs(b25).toFixed(1)}% since January 2025`);
  if (b19 != null) clauses.push(`${dir(b19)} ${Math.abs(b19).toFixed(1)}% since before the pandemic (Dec 2019)`);
  const changePart = clauses.length ? ` — ${clauses.join(', ')}` : '';
  const level = isDollar && item.latest_value != null
    ? `${name}: ${fmtVal(item.latest_value, item.units)} (${fmtDate(item.latest_date)})`
    : `${name} (${fmtDate(item.latest_date)})`;
  const src = item.fred_id
    ? `${item.source_note || 'FRED'} series ${item.fred_id}`
    : (item.source_note || 'federal data');
  return `${level}${changePart}. Source: ${src}, via the Economic Security Project Affordability Tracker.`;
}

// Lazy loader for the split state payloads (data/states/*.js and
// data/state_metrics/*.js). Each file assigns into a window global; the
// promise resolving means that global is populated.
const _loadedFiles = {};
function loadDataFile(src) {
  if (!_loadedFiles[src]) {
    _loadedFiles[src] = new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      s.onerror = () => { delete _loadedFiles[src]; reject(new Error('failed to load ' + src)); };
      document.head.appendChild(s);
    });
  }
  return _loadedFiles[src];
}

Object.assign(window, {
  ESP, fmtVal, fmtDate, pctChange, valueAt, sliceFrom, downloadCSV, downloadCardAsPNG,
  linePath, toPoints, hoursToAfford, REFERENCE_PRICES, scaleByCPI, categoryLabel,
  ANCHORS, anchorById, anchorDate, buildFactText, loadDataFile,
});

})();
</script>

<script type="text/babel" data-presets="react">
(function() {
// ── Main app ─────────────────────────────────────────────────────────────────
// Three views over the same design language:
//   National        — every national series as selectable chart cards + heatmap
//   My State        — all metrics for one state, each vs. the US (dashed)
//   Compare States  — one metric across all states: overlay chart + sparkline grid

const { ESP, fmtVal, fmtDate, pctChange, valueAt, sliceFrom, downloadCSV, downloadCardAsPNG,
        linePath, toPoints, categoryLabel, hoursToAfford, REFERENCE_PRICES, scaleByCPI,
        ANCHORS, anchorById, anchorDate, buildFactText, loadDataFile } = window;
const { useState, useMemo, useEffect, useRef } = React;

const NAVY = '#1B2A4E';
const WARM_RED = '#E04E39';
const BEIGE = '#F4ECD8';
const PAPER = '#FBF7EE';
const INK = '#0E1320';
const MUTE = '#6B6E78';
const SOFT = '#9A9CA3';

const CATEGORY_META = [
  { id: 'daily',     label: 'Daily items' },
  { id: 'groceries', label: 'Groceries' },
  { id: 'big',       label: 'Big-ticket' },
  { id: 'labor',     label: 'Work & wages' },
  { id: 'debt',      label: 'Debt' },
];

// Distinct colors assigned to pinned states in the compare view
const PIN_COLORS = ['#E04E39', '#7C3AED', '#0D9488', '#B45309', '#DB2777', '#2563EB', '#059669', '#64748B'];

// Lazy-load Chart.js + date adapter once
let chartJsPromise = null;
function loadChartJs() {
  if (chartJsPromise) return chartJsPromise;
  chartJsPromise = new Promise((resolve, reject) => {
    if (window.Chart) return resolve(window.Chart);
    const s1 = document.createElement('script');
    s1.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js';
    s1.onload = () => {
      const s2 = document.createElement('script');
      s2.src = 'https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js';
      s2.onload = () => resolve(window.Chart);
      s2.onerror = reject;
      document.head.appendChild(s2);
    };
    s1.onerror = reject;
    document.head.appendChild(s1);
  });
  return chartJsPromise;
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

const styles = {
  root: {
    width: '100%', minHeight: 1700, background: BEIGE, color: INK,
    fontFamily: '"Public Sans", system-ui, sans-serif',
    overflowX: 'hidden',
  },
  topbar: {
    background: NAVY, color: PAPER,
    padding: '16px 56px',
    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
    fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
    fontSize: 11, letterSpacing: '.18em', textTransform: 'uppercase', fontWeight: 600,
    borderBottom: '1px solid rgba(244,236,216,.12)',
  },
  hero: {
    background: NAVY, color: PAPER,
    padding: '56px 56px 44px',
    position: 'relative', overflow: 'hidden',
  },
  kicker: {
    fontFamily: 'Publico, Georgia, serif',
    fontSize: 28, letterSpacing: '-0.01em',
    fontWeight: 600, color: WARM_RED, marginBottom: 18,
  },
  h1: {
    fontFamily: 'Publico, Georgia, serif',
    fontSize: 64, lineHeight: 1.05, letterSpacing: '-0.025em', fontWeight: 500,
    color: PAPER, maxWidth: 1080,
    marginBottom: 28,
  },
  dek: {
    fontFamily: 'Publico, Georgia, serif',
    fontSize: 20, lineHeight: 1.55, color: '#E8C9A8', maxWidth: 720,
    fontStyle: 'italic',
  },
  controls: {
    background: PAPER, borderBottom: `1px solid rgba(27,42,78,.18)`,
    padding: '16px 56px',
    display: 'flex', alignItems: 'center', gap: 20,
  },
  controlLabel: {
    fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
    fontSize: 11, letterSpacing: '.22em', textTransform: 'uppercase',
    fontWeight: 700, color: MUTE,
  },
  viewTab: (active) => ({
    fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
    fontSize: 15, fontWeight: active ? 700 : 600,
    background: active ? PAPER : 'transparent',
    color: active ? NAVY : 'rgba(244,238,225,.85)',
    border: `1.5px solid ${active ? PAPER : 'rgba(244,238,225,.32)'}`,
    padding: '12px 22px',
    cursor: 'pointer',
    transition: 'all .15s',
    boxShadow: active ? '0 2px 0 rgba(0,0,0,.18)' : 'none',
  }),
  anchorBtn: (active) => ({
    fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
    fontSize: 12, fontWeight: active ? 700 : 600, letterSpacing: '.03em',
    background: active ? NAVY : 'transparent',
    color: active ? PAPER : INK,
    border: `1.5px solid ${active ? NAVY : 'rgba(27,42,78,.22)'}`,
    padding: '7px 13px', cursor: 'pointer', borderRadius: 100,
    transition: 'all .12s',
  }),
  modeBtn: (active) => ({
    fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
    fontSize: 11, fontWeight: 700, letterSpacing: '.05em',

// ── Copy-fact button (shared by all cards) ──────────────────────────────────
function CopyFactButton({ item, factLabel }) {
  const [copied, setCopied] = useState(false);
  return (
    <button
      style={{ ...styles.smallBtn, ...(copied ? { background: '#2E7D5B', borderColor: '#2E7D5B', color: PAPER } : {}) }}
      title="Copy a press-ready sentence with the latest numbers"
      onClick={async () => {
        const text = buildFactText(item, { factLabel });
        try {
          await navigator.clipboard.writeText(text);
          setCopied(true);
          setTimeout(() => setCopied(false), 1600);
        } catch (e) { window.prompt('Copy this fact:', text); }
      }}
      onMouseEnter={(e) => { if (!copied) { e.currentTarget.style.background = NAVY; e.currentTarget.style.color = PAPER; } }}
      onMouseLeave={(e) => { if (!copied) { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = NAVY; } }}
    >{copied ? '✓ Copied' : 'Copy fact'}</button>
  );
}

// ── Interactive Chart.js card ───────────────────────────────────────────────
// Transparent background, soft area fill, hover tooltip. `overlayItem` draws
// a dashed national-comparison line (used on state cards). `displayMode`
// 'pct' rebases everything to cumulative % change since the anchor.
function ChartCard({ item, anchorId, displayMode, overlayItem, factLabel }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  const cardRef = useRef(null);
  const [chartReady, setChartReady] = useState(!!window.Chart);
  const accent = item.color || WARM_RED;

  // Per-card override of the global anchor; resets when the global changes.
  const [ovr, setOvr] = useState(null);
  useEffect(() => { setOvr(null); }, [anchorId]);
  const activeId = ovr || anchorId;
  const active = anchorById(activeId);
  const cardSince = anchorDate(activeId, item.data);

  // Index series always display as % change; everything else follows the
  // global $/% toggle.
  const asPct = item.rebase || displayMode === 'pct';

  const visibleData = sliceFrom(item.data, cardSince);
  const v0 = (asPct && visibleData.length) ? visibleData[0].value : null;
  const toPct = (data, base) => data.map(d => ({ date: d.date, value: base ? (d.value / base - 1) * 100 : 0 }));
  const displayData = asPct ? toPct(visibleData, v0) : visibleData;
  const displayUnits = asPct
    ? `% change since ${fmtDate(visibleData[0]?.date || cardSince, { year: 'numeric', month: 'short' })}`
    : item.units;
  const headlineVal = asPct
    ? (displayData.length ? displayData[displayData.length - 1].value : 0)
    : item.latest_value;

  // Optional national overlay, transformed the same way
  const overlayVisible = overlayItem ? sliceFrom(overlayItem.data, cardSince) : null;
  const o0 = (asPct && overlayVisible && overlayVisible.length) ? overlayVisible[0].value : null;
  const overlayDisplay = overlayVisible
    ? (asPct ? toPct(overlayVisible, o0) : overlayVisible)
    : null;

  useEffect(() => {
    loadChartJs().then(() => setChartReady(true));
  }, []);

  useEffect(() => {
    if (!chartReady || !canvasRef.current) return;
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }

    const ctx = canvasRef.current.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 180);
    grad.addColorStop(0, hexToRgba(accent, 0.22));
    grad.addColorStop(0.7, hexToRgba(accent, 0.04));
    grad.addColorStop(1, hexToRgba(accent, 0));

    // Tight, round-numbered y-axis bounds across BOTH datasets. Pick a
    // "nice" step (1/2/5 × 10ⁿ) sized for the data range, then snap min/max
    // to multiples of it.
    const yVals = displayData.map(d => d.value)
      .concat(overlayDisplay ? overlayDisplay.map(d => d.value) : [])
      .filter(v => Number.isFinite(v));
    const dataMin = yVals.length ? Math.min(...yVals) : 0;
    const dataMax = yVals.length ? Math.max(...yVals) : 1;
    const dataRange = (dataMax - dataMin) || Math.max(Math.abs(dataMax), 1);
    const targetTicks = 4;
    const roughStep = dataRange / Math.max(targetTicks - 1, 1);
    const stepExp = Math.floor(Math.log10(roughStep));
    const stepFrac = roughStep / Math.pow(10, stepExp);
    const niceFrac = stepFrac < 1.5 ? 1 : stepFrac < 3 ? 2 : stepFrac < 7 ? 5 : 10;
    const yStep = niceFrac * Math.pow(10, stepExp);
    const yMin = Math.floor(dataMin / yStep) * yStep;
    const yMax = Math.ceil(dataMax / yStep) * yStep;

    const datasets = [{
      label: item.label,
      data: displayData.map(d => ({ x: d.date, y: d.value })),
      borderColor: accent,
      backgroundColor: grad,
      borderWidth: 1.8,
      pointRadius: 0,
      pointHoverRadius: 5,
      pointHoverBackgroundColor: accent,
      pointHoverBorderColor: PAPER,
      pointHoverBorderWidth: 2,
      tension: 0.32,
      fill: 'start',
    }];
    if (overlayDisplay && overlayDisplay.length) {
      datasets.push({
        label: 'US average',
        data: overlayDisplay.map(d => ({ x: d.date, y: d.value })),
        borderColor: hexToRgba(NAVY, 0.65),
        borderWidth: 1.4,
        borderDash: [5, 4],
        pointRadius: 0,
        pointHoverRadius: 4,
        tension: 0.32,
        fill: false,
      });
    }

    chartRef.current = new window.Chart(ctx, {
      type: 'line',
      data: { datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        layout: { padding: { top: 8 } },
        animation: { duration: 350, easing: 'easeOutQuart' },
        interaction: { intersect: false, mode: 'index' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: NAVY,
            titleColor: '#9BA8C2',
            bodyColor: PAPER,
            borderColor: 'rgba(244,236,216,.15)',
            borderWidth: 1,
            padding: 11,
            cornerRadius: 4,
            displayColors: false,
            titleFont: { size: 10, family: 'Inter Tight, system-ui', weight: '600' },
            bodyFont:  { size: 13, family: 'Source Serif 4, Georgia, serif', weight: '600' },
            callbacks: {
              title: (c) => fmtDate(c[0].parsed.x, { year: 'numeric', month: 'long' }),
              label: (c) => `  ${datasets.length > 1 ? c.dataset.label + ': ' : ''}` + fmtVal(c.parsed.y, displayUnits),
            },
          },
        },
        scales: {
          x: {
            type: 'time',
            time: { unit: activeId === '1y' ? 'month' : 'year' },
            grid: { display: false },
            border: { display: false },
            ticks: {
              color: MUTE,
              font: { size: 10, family: 'Inter Tight, system-ui' },
              maxTicksLimit: activeId === '1y' ? 6 : 5,
            },
          },
          y: {
            position: 'right',
            min: yMin,
            max: yMax,
            grid: { color: 'rgba(27,42,78,.08)', drawTicks: false },
            border: { display: false },
            ticks: {
              color: MUTE,
              font: { size: 10, family: 'Inter Tight, system-ui' },
              stepSize: yStep,
              callback: (v) => fmtVal(v, displayUnits),
            },
          },
        },
      },
    });

    return () => {
      if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    };
  }, [chartReady, item, cardSince, accent, displayMode, overlayItem]);

  const change = pctChange(item.data, cardSince);
  const up = change != null && change >= 0;
  const bad = item.invert_color ? !up : up;
  const changeColorFor = (v) => (item.invert_color ? v < 0 : v >= 0) ? WARM_RED : '#2E7D5B';

  // The two message anchors, always visible regardless of the active range
  const b25 = pctChange(item.data, '2025-01-01');
  const b19 = pctChange(item.data, '2019-12-01');
  const badge = (v, lbl) => v == null ? null : (
    <span key={lbl} style={{ whiteSpace: 'nowrap' }}>
      <span style={{ color: MUTE }}>{lbl} </span>
      <span style={{ color: changeColorFor(v), fontWeight: 700 }}>
        {v >= 0 ? '+' : '−'}{Math.abs(v).toFixed(1)}%
      </span>
    </span>
  );

  const headlineText = asPct
    ? (headlineVal >= 0 ? '+' : '') + headlineVal.toFixed(1) + '%'
    : fmtVal(headlineVal, displayUnits);
  const changeText = asPct
    ? (up ? '↑ ' : '↓ ') + active.phrase
    : (up ? '↑ +' : '↓ ') + Math.abs(change || 0).toFixed(1) + '% ' + active.phrase;

  return (
    <div ref={cardRef} style={{
      background: 'transparent',
      borderTop: `2px solid ${accent}`,
      padding: '18px 22px 16px',
      display: 'flex', flexDirection: 'column', gap: 12,
    }}>
      {/* Header */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12 }}>
        <div style={{ minWidth: 0, flex: 1 }}>
          <div style={{
            fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
            fontSize: 10, letterSpacing: '.18em', textTransform: 'uppercase',
            fontWeight: 700, color: accent, marginBottom: 4,
          }}>{item.eyebrow || categoryLabel(item.category)}</div>
          <div style={{
            fontFamily: 'Publico, Georgia, serif',
            fontSize: 20, fontWeight: 500, lineHeight: 1.15, color: INK,
          }}>{item.label}</div>
          <div style={{
            fontSize: 12, color: MUTE, marginTop: 3,
            fontFamily: 'Publico, Georgia, serif', fontStyle: 'italic',
          }}>{item.subtitle}</div>
        </div>
        <div style={{ textAlign: 'right', flexShrink: 0 }}>
          <div style={{
            fontFamily: 'Publico, Georgia, serif',
            fontSize: 28, fontWeight: 500, lineHeight: 1, color: INK,
          }}>{headlineText}</div>
          <div style={{
            fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
            fontSize: 11, fontWeight: 700, marginTop: 6,
            color: bad ? WARM_RED : '#2E7D5B',
          }}>{changeText}</div>
        </div>
      </div>

      {/* Dual anchor badges — the two numbers a press release needs */}
      {(b25 != null || b19 != null) && (
        <div style={{
          fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
          fontSize: 11, display: 'flex', gap: 14, flexWrap: 'wrap',
          padding: '7px 10px', background: hexToRgba(NAVY, 0.045),
          border: `1px solid rgba(27,42,78,.08)`, borderRadius: 4,
        }}>
          {badge(b25, "Since Jan '25")}
          {badge(b19, 'Since pre-pandemic')}
        </div>
      )}

      {/* Range buttons */}
      <div className="at-range-row" style={{
        display: 'flex', gap: 4, alignItems: 'center',
        margin: '2px 0 -4px',
      }}>
        {ANCHORS.map(r => {
          const on = r.id === activeId;
          return (
            <button
              key={r.id}
              onClick={() => setOvr(r.id)}
              style={{
                fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
                fontSize: 10, fontWeight: 600, letterSpacing: '.05em',
                background: on ? NAVY : 'transparent',
                color: on ? PAPER : MUTE,
                border: `1px solid ${on ? NAVY : 'rgba(27,42,78,.18)'}`,
                padding: '3px 8px',
                cursor: 'pointer',
                transition: 'all .12s',
              }}
            >{r.label}</button>
          );
        })}
      </div>

      {/* Chart */}
      <div style={{ height: 240, position: 'relative' }}>
        <canvas ref={canvasRef} />
      </div>
      {overlayItem && (
        <div style={{
          fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
          fontSize: 10, color: MUTE, marginTop: -6,
        }}>
          <span style={{ borderBottom: `2px dashed ${hexToRgba(NAVY, 0.65)}`, paddingBottom: 1 }}>– –</span> US average
        </div>
      )}

      {/* Footer */}
      <div style={{
        fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
        fontSize: 9, color: SOFT, letterSpacing: '.1em',
        textTransform: 'uppercase',
        paddingTop: 8, borderTop: `1px solid rgba(27,42,78,.1)`,
        display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12,
      }}>
        {item.fred_id ? (
          <a
            href={`https://fred.stlouisfed.org/series/${item.fred_id}`}
            target="_blank"
            rel="noopener noreferrer"
            style={{ color: SOFT, textDecoration: 'none', borderBottom: '1px dotted rgba(27,42,78,.3)' }}
            onMouseEnter={(e) => { e.currentTarget.style.color = NAVY; }}
            onMouseLeave={(e) => { e.currentTarget.style.color = SOFT; }}
          >
            Source · FRED · {item.fred_id} ↗
          </a>
        ) : (
          <span>{item.source_note || 'Derived from public data'}</span>
        )}
        <span style={{ display: 'flex', gap: 8, alignItems: 'center' }} data-export-hide>
          <CopyFactButton item={item} factLabel={factLabel} />
          <button
            onClick={() => downloadCSV(item)}
            style={styles.smallBtn}
            onMouseEnter={(e) => { e.currentTarget.style.background = NAVY; e.currentTarget.style.color = PAPER; }}
            onMouseLeave={(e) => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = NAVY; }}
          >↓ CSV</button>
          <button
            onClick={async () => {
              const chartCanvas = cardRef.current?.querySelector('canvas');
              const changeColor = bad ? WARM_RED : '#2E7D5B';
              try {
                await downloadCardAsPNG({
                  chartCanvas, item, accent,
                  headlineText, changeText, changeColor, rangeLabel: active.phrase,
                });
              } catch (err) { console.error('PNG export failed', err); }
            }}
            style={styles.smallBtn}
            onMouseEnter={(e) => { e.currentTarget.style.background = NAVY; e.currentTarget.style.color = PAPER; }}
            onMouseLeave={(e) => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = NAVY; }}
          >↓ PNG</button>
        </span>
      </div>
    </div>
  );
}

// ── YoY heatmap with cumulative anchor columns ──────────────────────────────
function Heatmap({ items }) {
  const years = [2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025, 2026];

  const matrix = items.map(item => ({
    item,
    cells: years.map(yr => {
      const cur = valueAt(item.data, `${yr}-01-15`);
      const prior = valueAt(item.data, `${yr - 1}-01-15`);
      if (!cur || !prior) return null;
      return ((cur - prior) / prior) * 100;
    }),
    cum19: pctChange(item.data, '2019-12-01'),
    cum25: pctChange(item.data, '2025-01-01'),
  }));

  const colorScaled = (v, span) => {
    if (v == null) return BEIGE;
    const clamp = Math.max(-span, Math.min(span, v));
    const a = Math.abs(clamp) / span;
    const lerp = (s, e) => Math.round(s + (e - s) * a);
    if (clamp > 0) return `rgb(${lerp(244, 224)},${lerp(236, 78)},${lerp(216, 57)})`;
    return `rgb(${lerp(244, 46)},${lerp(236, 125)},${lerp(216, 91)})`;
  };
  const color = (v) => colorScaled(v, 15);
  // Cumulative columns cover 6+ years of change; a wider clamp keeps them
  // from saturating uniformly red.
  const colorCum = (v) => colorScaled(v, 40);
  const textColor = (v, span = 15) => v == null ? MUTE : (Math.abs(v) > span * 0.47 ? PAPER : INK);

  if (!items.length) {
    return (
      <div style={{
        background: PAPER, border: `1px solid rgba(27,42,78,.18)`,
        padding: '32px', textAlign: 'center',
        fontFamily: 'Publico, Georgia, serif', fontStyle: 'italic', color: MUTE,
      }}>
        Select at least one metric above to see the year-by-year breakdown.
      </div>
    );
  }

  const cumHeader = {
    textAlign: 'center', fontSize: 10, lineHeight: 1.25,
    fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
    fontWeight: 700, color: WARM_RED, padding: '0 0 6px',
    textTransform: 'uppercase', letterSpacing: '.04em',
  };
  const cumCell = { borderLeft: `2px solid ${BEIGE}` };

  return (
    <div style={{ background: PAPER, border: `1px solid rgba(27,42,78,.18)`, padding: '24px' }}>
      <div style={{
        display: 'flex', justifyContent: 'flex-end', alignItems: 'center', gap: 8,
        fontSize: 10, color: MUTE, marginBottom: 14,
        fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif', letterSpacing: '.1em',
      }}>
        <span>−15%</span>
        <div style={{ width: 120, height: 10,
          background: `linear-gradient(90deg, ${color(-15)}, ${color(0)}, ${color(15)})` }} />
        <span>+15%</span>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: `220px repeat(${years.length}, 1fr) 14px 1.35fr 1.35fr`, gap: 2 }}>
        <div></div>
        {years.map(yr => (
          <div key={yr} style={{
            textAlign: 'center', fontSize: 11,
            fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
            fontWeight: 700, color: INK, padding: '0 0 6px',
          }}>{yr}</div>
        ))}
        <div></div>
        <div style={cumHeader}>Since<br/>Dec '19</div>
        <div style={cumHeader}>Since<br/>Jan '25</div>
        {matrix.map(row => (
          <React.Fragment key={row.item.id}>
            <div style={{
              padding: '12px 8px', fontSize: 13, fontWeight: 600, color: INK,
              fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
            }}>
              {row.item.label}
              <div style={{ fontSize: 10, color: MUTE, fontWeight: 400, marginTop: 2 }}>
                {row.item.subtitle}
              </div>
            </div>
            {row.cells.map((v, i) => (
              <div key={i} style={{
                background: color(v), color: textColor(v),
                padding: '12px 4px', textAlign: 'center',
                fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
                fontSize: 13, fontWeight: 700,
              }}>
                {v == null ? '—' : `${v >= 0 ? '+' : ''}${v.toFixed(1)}`}
              </div>
            ))}
            <div></div>
            {[row.cum19, row.cum25].map((v, i) => (
              <div key={'c' + i} style={{
                background: colorCum(v), color: textColor(v, 40),
                padding: '12px 4px', textAlign: 'center',
                fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
                fontSize: 13, fontWeight: 700, ...cumCell,
              }}>
                {v == null ? '—' : `${v >= 0 ? '+' : ''}${v.toFixed(1)}%`}
              </div>
            ))}
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

// ── Hours to afford ─────────────────────────────────────────────────────────
function HoursToAfford({ data }) {
  const wageItem = data.hourly_earnings;
  if (!wageItem) return null;
  const wage = wageItem.latest_value;
  const asOf = wageItem.latest_date;

  const rows = [
    data.groceries && {
      label: 'A week of groceries',
      price: scaleByCPI(data.groceries.data, asOf, REFERENCE_PRICES.groceriesWeekly2025),
    },
    data.zori_rent && {
      label: "A month's rent (market)",
      price: data.zori_rent.latest_value,
    },
  ].filter(Boolean).map(r => ({ ...r, hours: hoursToAfford(r.price, wage) })).filter(r => r.hours != null);

  if (!rows.length) return null;

  return (
    <div style={{
      background: NAVY, color: PAPER, padding: '26px 32px',
      display: 'flex', flexWrap: 'wrap', gap: 32, alignItems: 'center',
      marginBottom: 28,
    }}>
      <div style={{ maxWidth: 240 }}>
        <div style={{
          fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
          fontSize: 11, letterSpacing: '.18em', textTransform: 'uppercase',
          color: '#9BA8C2', marginBottom: 6, fontWeight: 700,
        }}>Hours of work</div>
        <div style={{ fontFamily: 'Publico, Georgia, serif', fontSize: 15, fontStyle: 'italic', color: '#E8C9A8' }}>
          At the average wage of ${wage.toFixed(2)}/hr
        </div>
      </div>
      {rows.map(r => (
        <div key={r.label}>
          <div style={{ fontFamily: 'Publico, Georgia, serif', fontSize: 40, fontWeight: 500, lineHeight: 1 }}>
            {r.hours.toFixed(1)}<span style={{ fontSize: 18 }}> hrs</span>
          </div>
          <div style={{
            fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
            fontSize: 12, color: '#9BA8C2', marginTop: 6,
          }}>{r.label} (~${Math.round(r.price).toLocaleString()})</div>
        </div>
      ))}
    </div>
  );
}

// ── National view ────────────────────────────────────────────────────────────
function NationalView({ data, anchorId, displayMode }) {
  const allItems = useMemo(
    () => Object.values(data).filter(i => !i.overlay_only),
    [data]
  );
  const byCategory = useMemo(() => {
    const m = {};
    CATEGORY_META.forEach(c => { m[c.id] = allItems.filter(i => i.category === c.id); });
    return m;
  }, [allItems]);

  const [selectedIds, setSelectedIds] = useState(() =>
    new Set(allItems.filter(i => i.category === 'daily').map(i => i.id))
  );

  const toggleId = (id) => {
    setSelectedIds(prev => {
      const n = new Set(prev);
      if (n.has(id)) n.delete(id); else n.add(id);
      return n;
    });
  };

  // Category pills are additive bulk toggles: clicking one adds (or removes)
  // its items without touching what's selected elsewhere — the comms team's
  // "let me throw groceries in with Big Ticket" request. Every chip stays
  // visible; unselected ones are grayed, not hidden.
  const catState = (catId) => {
    const items = byCategory[catId] || [];
    const on = items.filter(i => selectedIds.has(i.id)).length;
    return on === 0 ? 'none' : on === items.length ? 'all' : 'some';
  };
  const toggleCategory = (catId) => {
    const items = byCategory[catId] || [];
    const state = catState(catId);
    setSelectedIds(prev => {
      const n = new Set(prev);
      if (state === 'all') items.forEach(i => n.delete(i.id));
      else items.forEach(i => n.add(i.id));
      return n;
    });
  };

  const selectedItems = allItems.filter(i => selectedIds.has(i.id));
  const anchor = anchorById(anchorId);

  return (
    <React.Fragment>
      {/* Selection chips, grouped by category with family colors */}
      <div className="at-pad" style={{
        background: PAPER, borderBottom: `1px solid rgba(27,42,78,.18)`,
        padding: '16px 56px 18px',
        display: 'flex', flexDirection: 'column', gap: 10,
      }}>
        {CATEGORY_META.map(cat => (
          <div key={cat.id} style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap' }}>
            <button onClick={() => toggleCategory(cat.id)} style={{ ...styles.catPill(catState(cat.id)), width: 130, textAlign: 'center' }}>
              {cat.label}
            </button>
            {(byCategory[cat.id] || []).map(item => {
              const on = selectedIds.has(item.id);
              return (
                <button key={item.id} onClick={() => toggleId(item.id)} style={styles.checkChip(on, item.color || WARM_RED)}>
                  <span style={styles.checkBox(on, item.color || WARM_RED)}>{on ? '✓' : ''}</span>
                  {item.label}
                </button>
              );
            })}
          </div>
        ))}
        <div style={{ display: 'flex', gap: 16, marginTop: 2 }}>
          <button
            onClick={() => setSelectedIds(new Set(allItems.map(i => i.id)))}
            style={{ ...styles.smallBtn, border: 'none', textDecoration: 'underline', textUnderlineOffset: 3, fontSize: 10 }}
          >Select all</button>
          <button
            onClick={() => setSelectedIds(new Set())}
            style={{ ...styles.smallBtn, border: 'none', textDecoration: 'underline', textUnderlineOffset: 3, fontSize: 10 }}
          >Clear all</button>
        </div>
      </div>

      <div className="at-pad" style={{ padding: '36px 56px 56px' }}>
        <HoursToAfford data={data} />

        <div className="at-section-head" style={styles.sectionHead}>
          <span style={styles.sectionLabel}>§01</span>
          <span style={styles.sectionTitle}>
            {selectedItems.length === 0
              ? 'Nothing selected'
              : selectedItems.length === 1
                ? selectedItems[0].label
                : `${selectedItems.length} metrics, ${anchor.phrase}`}
          </span>
          <span className="at-section-dek" style={styles.sectionDek}>Hover any chart for monthly values.</span>
        </div>

        {selectedItems.length === 0 ? (
          <div style={{
            background: PAPER, border: `1px solid rgba(27,42,78,.18)`,
            padding: '48px 32px', textAlign: 'center',
            fontFamily: 'Publico, Georgia, serif', fontStyle: 'italic', color: MUTE,
          }}>
            Pick one or more metrics above to see them charted.
          </div>
        ) : (
          <div className="at-cards-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(420px, 1fr))', gap: 0,
            border: `1px solid rgba(27,42,78,.14)`, background: 'transparent' }}>
            {selectedItems.map((item, i) => {
              const col = i % 2;
              const row = Math.floor(i / 2);
              const total = selectedItems.length;
              const lastRow = Math.floor((total - 1) / 2);
              return (
                <div key={item.id} className="at-card" style={{
                  borderRight: col < 1 ? `1px solid rgba(27,42,78,.14)` : 'none',
                  borderBottom: row < lastRow ? `1px solid rgba(27,42,78,.14)` : 'none',
                }}>
                  <ChartCard item={item} anchorId={anchorId} displayMode={displayMode} />
                </div>
              );
            })}
          </div>
        )}

        <div className="at-section-head" style={{ ...styles.sectionHead, marginTop: 48 }}>
          <span style={styles.sectionLabel}>§02</span>
          <span style={styles.sectionTitle}>Year by year</span>
          <span className="at-section-dek" style={styles.sectionDek}>YoY % change each January, plus the two anchors, for the metrics you've selected.</span>
        </div>
        <div className="at-heatmap-scroll">
          <Heatmap items={selectedItems} />
        </div>
      </div>
    </React.Fragment>
  );
}

// ── State view: all metrics for one state, each vs. the US ──────────────────
function fmtAnnual(value, units) {
  if ((units || '').includes('%')) return Number(value).toFixed(1) + '%';
  if ((units || '').includes('$')) return '$' + Math.round(Number(value)).toLocaleString();
  return Number(value).toLocaleString();
}

function StateView({ data, code, setCode, anchorId, displayMode }) {
  const idx = window.AFFORDABILITY_STATES;
  const [status, setStatus] = useState('loading');

  useEffect(() => {
    let live = true;
    setStatus('loading');
    loadDataFile(`data/states/${code.toLowerCase()}.js`)
      .then(() => { if (live) setStatus('ready'); })
      .catch(() => { if (live) setStatus('error'); });
    return () => { live = false; };
  }, [code]);

  const stateList = idx ? idx.states : [];
  const pos = stateList.findIndex(s => s.code === code);
  const step = (d) => {
    const n = stateList[(pos + d + stateList.length) % stateList.length];
    if (n) setCode(n.code);
  };

  const sd = (status === 'ready' && window.STATE_DATA) ? window.STATE_DATA[code] : null;

  const picker = (
    <div className="at-pad" style={{
      background: PAPER, borderBottom: `1px solid rgba(27,42,78,.18)`,
      padding: '16px 56px',
      display: 'flex', alignItems: 'center', gap: 14, flexWrap: 'wrap',
    }}>
      <span style={styles.controlLabel}>State</span>
      <button onClick={() => step(-1)} style={{ ...styles.smallBtn, padding: '8px 10px', fontSize: 12 }}>←</button>
      <select value={code} onChange={(e) => setCode(e.target.value)} style={styles.select}>
        {stateList.map(s => <option key={s.code} value={s.code}>{s.name}</option>)}
      </select>
      <button onClick={() => step(1)} style={{ ...styles.smallBtn, padding: '8px 10px', fontSize: 12 }}>→</button>
      <span style={{
        fontFamily: 'Publico, Georgia, serif', fontSize: 13, fontStyle: 'italic', color: MUTE,
      }}>Every chart shows this state against the US average (dashed).</span>
    </div>
  );

  if (!idx) return null;
  if (status !== 'ready' || !sd) {
    return (
      <React.Fragment>
        {picker}
        <div className="at-pad" style={{ padding: '48px 56px', fontFamily: 'Publico, Georgia, serif', fontStyle: 'italic', color: MUTE }}>
          {status === 'error' ? `Could not load data for ${code}.` : 'Loading state data…'}
        </div>
      </React.Fragment>
    );
  }

  const cards = idx.metrics
    .filter(m => sd.metrics && sd.metrics[m.id])
    .map(m => {
      const sm = sd.metrics[m.id];
      const coverageNote = sm.coverage && sm.coverage < 1
        ? ` · covers ${(sm.coverage * 100).toFixed(0)}% of renters`
        : '';
      const item = {
        id: `${code.toLowerCase()}_${m.id}`,
        label: m.label,
        eyebrow: sd.name,
        subtitle: `${m.source_label}${coverageNote}`,
        category: 'state',
        units: m.units,
        description: m.description,
        color: m.color,
        fred_id: sm.fred_id,
        source_note: m.source_label,
        rebase: m.rebase,
        invert_color: m.invert_color,
        latest_value: sm.latest_value,
        latest_date: sm.latest_date,
        data: sm.data,
      };
      const overlay = m.national_id && data[m.national_id] ? data[m.national_id] : null;
      return { item, overlay, factLabel: `${sd.name} — ${m.label}` };
    });

  const annualTiles = (idx.annual || []).filter(a => sd.annual && sd.annual[a.id] != null);

  return (
    <React.Fragment>
      {picker}
      <div className="at-pad" style={{ padding: '36px 56px 56px' }}>
        <div className="at-section-head" style={styles.sectionHead}>

          <span className="at-section-dek" style={styles.sectionDek}>
            No state-level CPI exists — these are the price and income series that do.
          </span>
        </div>

        <div className="at-cards-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(420px, 1fr))', gap: 0,
          border: `1px solid rgba(27,42,78,.14)` }}>
          {cards.map(({ item, overlay, factLabel }, i) => {
            const col = i % 2;
            const row = Math.floor(i / 2);
            const lastRow = Math.floor((cards.length - 1) / 2);
            return (
              <div key={item.id} className="at-card" style={{
                borderRight: col < 1 ? `1px solid rgba(27,42,78,.14)` : 'none',
                borderBottom: row < lastRow ? `1px solid rgba(27,42,78,.14)` : 'none',

        {annualTiles.length > 0 && (

              <span style={styles.sectionLabel}>§02</span>

                Costs and debt burdens published once a year — context, not live tracking.

            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(240px, 1fr))', gap: 14 }}>
              {annualTiles.map(a => (
                <div key={a.id} style={{

                  borderTop: `2px solid ${WARM_RED}`, padding: '16px 18px',
                }}>
                  <div style={{
                    fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
                    fontSize: 10, letterSpacing: '.14em', textTransform: 'uppercase',

                    {a.units} · {a.year}<br/>
                    <a href={a.source_url} target="_blank" rel="noopener noreferrer"

          </React.Fragment>

    </React.Fragment>
  );
}

// ── Compare view: one metric, all states ────────────────────────────────────
function Sparkline({ data, color, w = 130, h = 34 }) {
  const pts = toPoints(data, w, h);
  if (!pts.length) return <div style={{ height: h }} />;
  return (
    <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{ display: 'block' }}>
      <path d={linePath(pts)} fill="none" stroke={color} strokeWidth="1.5" vectorEffect="non-scaling-stroke" />
    </svg>
  );
}

function CompareChart({ metric, seriesList, anchorId, displayMode }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  const [chartReady, setChartReady] = useState(!!window.Chart);

  useEffect(() => { loadChartJs().then(() => setChartReady(true)); }, []);

  const asPct = metric.rebase || displayMode === 'pct';

  useEffect(() => {
    if (!chartReady || !canvasRef.current) return;
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    const ctx = canvasRef.current.getContext('2d');

    const datasets = seriesList.map(s => {
      const since = anchorDate(anchorId, s.data);
      let vis = sliceFrom(s.data, since);
      if (asPct && vis.length) {
        const v0 = vis[0].value;
        vis = vis.map(d => ({ date: d.date, value: v0 ? (d.value / v0 - 1) * 100 : 0 }));
      }
      return {
        label: s.label,
        data: vis.map(d => ({ x: d.date, y: d.value })),
        borderColor: s.color,
        borderWidth: s.dashed ? 1.6 : 2,
        borderDash: s.dashed ? [5, 4] : undefined,
        pointRadius: 0,
        pointHoverRadius: 4,
        tension: 0.32,
        fill: false,
      };
    });

    const displayUnits = asPct ? '%' : metric.units;

    chartRef.current = new window.Chart(ctx, {
      type: 'line',
      data: { datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 350, easing: 'easeOutQuart' },
        interaction: { intersect: false, mode: 'index' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: NAVY, titleColor: '#9BA8C2', bodyColor: PAPER,
            borderColor: 'rgba(244,236,216,.15)', borderWidth: 1, padding: 11,
            cornerRadius: 4, displayColors: true, boxWidth: 8, boxHeight: 8,
            titleFont: { size: 10, family: 'Inter Tight, system-ui', weight: '600' },
            bodyFont:  { size: 12, family: 'Inter Tight, system-ui', weight: '600' },
            callbacks: {
              title: (c) => fmtDate(c[0].parsed.x, { year: 'numeric', month: 'long' }),
              label: (c) => ` ${c.dataset.label}: ${fmtVal(c.parsed.y, displayUnits)}`,
            },
          },
        },
        scales: {
          x: {
            type: 'time',
            time: { unit: anchorId === '1y' ? 'month' : 'year' },
            grid: { display: false }, border: { display: false },
            ticks: { color: MUTE, font: { size: 10, family: 'Inter Tight, system-ui' }, maxTicksLimit: 7 },
          },
          y: {
            position: 'right',
            grid: { color: 'rgba(27,42,78,.08)', drawTicks: false },
            border: { display: false },
            ticks: {
              color: MUTE, font: { size: 10, family: 'Inter Tight, system-ui' },
              callback: (v) => fmtVal(v, displayUnits),
            },
          },
        },
      },
    });

    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [chartReady, metric, seriesList, anchorId, displayMode]);

  return (
    <div style={{ height: 340, position: 'relative' }}>
      <canvas ref={canvasRef} />
    </div>
  );
}

function CompareView({ data, metricId, setMetricId, homeState, anchorId, displayMode }) {
  const idx = window.AFFORDABILITY_STATES;
  const [status, setStatus] = useState('loading');
  const [pinned, setPinned] = useState(() => [homeState].filter(Boolean));
  const [sortBy, setSortBy] = useState('az');

  useEffect(() => {
    let live = true;
    setStatus('loading');
    loadDataFile(`data/state_metrics/${metricId}.js`)
      .then(() => { if (live) setStatus('ready'); })
      .catch(() => { if (live) setStatus('error'); });
    return () => { live = false; };
  }, [metricId]);

  if (!idx) return null;
  const metric = idx.metrics.find(m => m.id === metricId) || idx.metrics[0];
  const md = (status === 'ready' && window.STATE_METRIC) ? window.STATE_METRIC[metricId] : null;

  const names = {};
  idx.states.forEach(s => { names[s.code] = s.name; });

  const togglePin = (code) => {
    setPinned(prev => {
      if (prev.includes(code)) return prev.filter(c => c !== code);
      const next = [...prev, code];
      return next.length > PIN_COLORS.length ? next.slice(next.length - PIN_COLORS.length) : next;
    });
  };

  const anchorD = anchorDate(anchorId, null);
  const asPct = metric.rebase || displayMode === 'pct';

  let rows = [];
  if (md) {
    rows = Object.keys(md.states).map(code => {
      const s = md.states[code];
      return {
        code,
        name: names[code] || code,
        latest: s.latest_value,
        change: pctChange(s.data, anchorId === 'max' ? s.data[0].date : anchorD),
        data: s.data,
      };
    });
    rows.sort(sortBy === 'az'
      ? (a, b) => a.name.localeCompare(b.name)
      : (a, b) => (b.change ?? -Infinity) - (a.change ?? -Infinity));
  }

  // Overlay chart series: US national (dashed) + pinned states
  const seriesList = [];
  const natItem = metric.national_id && data[metric.national_id];
  if (natItem) seriesList.push({ label: 'US', color: hexToRgba(NAVY, 0.75), dashed: true, data: natItem.data });
  pinned.forEach((code, i) => {
    const s = md && md.states[code];
    if (s) seriesList.push({ label: names[code] || code, color: PIN_COLORS[i % PIN_COLORS.length], data: s.data });
  });

  const changeColorFor = (v) => v == null ? MUTE : (metric.invert_color ? v < 0 : v >= 0) ? WARM_RED : '#2E7D5B';

  return (
    <React.Fragment>
      {/* Metric picker */}
      <div className="at-pad" style={{
        background: PAPER, borderBottom: `1px solid rgba(27,42,78,.18)`,
        padding: '16px 56px',
        display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap',
      }}>
        <span style={styles.controlLabel}>Metric</span>
        {idx.metrics.map(m => {
          const on = m.id === metric.id;
          return (
            <button key={m.id} onClick={() => setMetricId(m.id)} style={{
              fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
              fontSize: 13, fontWeight: on ? 700 : 600,
              padding: '8px 15px',
              border: `1.5px solid ${on ? NAVY : 'rgba(27,42,78,.22)'}`,
              background: on ? NAVY : 'transparent',
              color: on ? PAPER : INK,
              cursor: 'pointer', borderRadius: 100,
            }}>{m.label}</button>
          );
        })}
      </div>

      <div className="at-pad" style={{ padding: '36px 56px 56px' }}>
        {status !== 'ready' || !md ? (
          <div style={{ padding: '48px 0', fontFamily: 'Publico, Georgia, serif', fontStyle: 'italic', color: MUTE }}>
            {status === 'error' ? 'Could not load this metric.' : 'Loading state data…'}
          </div>
        ) : (
          <React.Fragment>
            <div className="at-section-head" style={styles.sectionHead}>
              <span style={styles.sectionLabel}>§01</span>
              <span style={styles.sectionTitle}>{metric.label} — pick states to overlay</span>
              <span className="at-section-dek" style={styles.sectionDek}>{metric.source_label} · {metric.frequency}</span>
            </div>

            {/* Pinned chips + add control */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 16 }}>
              {natItem && (
                <span style={{
                  fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif', fontSize: 12, fontWeight: 700,
                  display: 'inline-flex', alignItems: 'center', gap: 7,
                  padding: '6px 12px', border: `1px dashed ${hexToRgba(NAVY, 0.5)}`, color: NAVY, borderRadius: 100,
                }}>
                  <span style={{ width: 16, borderTop: `2px dashed ${hexToRgba(NAVY, 0.75)}` }} /> US average

                        fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
                        fontSize: 13, fontWeight: 800, color: INK, letterSpacing: '.02em',
                      }}>{r.code}</span>
                      <span style={{
                        fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
                        fontSize: 11, fontWeight: 700, color: changeColorFor(r.change),
                      }}>{r.change == null ? '—' : (r.change >= 0 ? '+' : '−') + Math.abs(r.change).toFixed(1) + '%'}</span>
                    </div>
                    <Sparkline data={spark} color={pinColor} />
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 6 }}>
                      <span style={{
                        fontFamily: 'Publico, Georgia, serif', fontSize: 15, fontWeight: 600, color: INK,
                      }}>{r.latest == null ? '—' : fmtVal(r.latest, metric.units)}</span>
                      <span style={{ fontSize: 9.5, color: SOFT, textTransform: 'uppercase', letterSpacing: '.05em',
                        fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif', fontWeight: 600,
                        overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{r.name}</span>
                    </div>
                  </button>
                );
              })}
            </div>
            <div style={{
              marginTop: 14, fontFamily: 'Publico, Georgia, serif', fontStyle: 'italic',
              fontSize: 12.5, color: MUTE,
            }}>
              % change is measured {anchorById(anchorId).phrase}.
              {metric.id === 'rent' && ' State rents aggregate Zillow county data with renter-household weights; states where coverage falls below half of renter households are omitted.'}
            </div>
          </React.Fragment>
        )}
      </div>
    </React.Fragment>
  );
}

// ── Shell ────────────────────────────────────────────────────────────────────
function parseHash() {
  const out = {};
  const h = (window.location.hash || '').replace(/^#/, '');
  h.split('&').forEach(kv => {
    const [k, v] = kv.split('=');
    if (k && v) out[decodeURIComponent(k)] = decodeURIComponent(v);
  });
  return out;
}

function AppMain({ data }) {
  const idx = window.AFFORDABILITY_STATES;
  const hash = useMemo(parseHash, []);
  const validState = (c) => idx && idx.states.some(s => s.code === c);
  const validMetric = (m) => idx && idx.metrics.some(x => x.id === m);

  const [view, setView] = useState(
    ['national', 'state', 'compare'].includes(hash.view) && (hash.view === 'national' || idx) ? hash.view : 'national');
  const [anchorId, setAnchorId] = useState(ANCHORS.some(a => a.id === hash.anchor) ? hash.anchor : '2025');
  const [displayMode, setDisplayMode] = useState(hash.mode === 'pct' ? 'pct' : 'level');
  const [stateCode, setStateCode] = useState(validState(hash.state) ? hash.state : 'CA');
  const [metricId, setMetricId] = useState(validMetric(hash.metric) ? hash.metric : (idx && idx.metrics[0] ? idx.metrics[0].id : 'unemployment'));

  // Deep links: a campaigner can send a colleague straight to their state.
  useEffect(() => {
    const parts = [`view=${view}`, `anchor=${anchorId}`];
    if (displayMode === 'pct') parts.push('mode=pct');
    if (view === 'state') parts.push(`state=${stateCode}`);
    if (view === 'compare') { parts.push(`metric=${metricId}`); }
    window.history.replaceState(null, '', '#' + parts.join('&'));
  }, [view, anchorId, displayMode, stateCode, metricId]);

  const lastUpdated = (() => {
    const stamps = Object.values(data).map(d => d.last_updated).filter(Boolean).sort();
    return stamps.length ? stamps[stamps.length - 1] : null;
  })();

  const VIEWS = [
    { id: 'national', label: 'National' },
    ...(idx ? [
      { id: 'state',   label: 'My State' },
      { id: 'compare', label: 'Compare States' },
    ] : []),
  ];

  return (
    <div style={styles.root}>
      {/* Top bar */}
      <div className="at-pad" style={styles.topbar}>
        <span>Economic Security Project</span>
        <a href="about.html" style={{
          color: PAPER, textDecoration: 'none',
          borderBottom: '1px dotted rgba(244,236,216,.5)', paddingBottom: 1,
        }}>About the data →</a>
      </div>

      {/* Hero */}
      <header className="at-pad at-hero" style={styles.hero}>
        <div style={styles.kicker}>The Affordability Tracker · {(new Date()).getFullYear()}</div>
        <h1 className="at-h1" style={styles.h1}>What's gotten<br/>more expensive.</h1>
        <p className="at-dek" style={styles.dek}>
          A long, careful look at the federal price data — national and state by state.
          Built for the people who write about it, organize around it, and have to live inside it.
        </p>
        {lastUpdated && (
          <div style={{
            marginTop: 22,
            fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
            fontSize: 12, letterSpacing: '.18em', textTransform: 'uppercase',
            color: 'rgba(244,238,225,.6)', fontWeight: 600,
          }}>
            Last updated · {new Date(lastUpdated + 'T12:00:00').toLocaleDateString('en-US', {
              year: 'numeric', month: 'long', day: 'numeric',
            })}
          </div>
        )}

        {/* View tabs */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap', marginTop: 38 }}>
          {VIEWS.map(v => (
            <button key={v.id} onClick={() => setView(v.id)} style={styles.viewTab(view === v.id)}>
              {v.label}
            </button>
          ))}
        </div>
      </header>

      {/* Global controls: anchor + $/% */}
      <div className="at-pad at-controls" style={styles.controls}>
        <span style={styles.controlLabel}>Measure from</span>
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
          {ANCHORS.map(a => (
            <button key={a.id} onClick={() => setAnchorId(a.id)} style={styles.anchorBtn(a.id === anchorId)}>
              {a.label}
            </button>
          ))}
        </div>
        <span style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={styles.controlLabel}>View</span>
          <span style={{ display: 'flex' }}>
            <button onClick={() => setDisplayMode('level')} style={styles.modeBtn(displayMode === 'level')}>$ levels</button>
            <button onClick={() => setDisplayMode('pct')} style={styles.modeBtn(displayMode === 'pct')}>% change</button>
          </span>
        </span>
      </div>

      {view === 'national' && <NationalView data={data} anchorId={anchorId} displayMode={displayMode} />}
      {view === 'state'    && <StateView data={data} code={stateCode} setCode={setStateCode}
                                         anchorId={anchorId} displayMode={displayMode} />}
      {view === 'compare'  && <CompareView data={data} metricId={metricId} setMetricId={setMetricId}
                                           homeState={stateCode} anchorId={anchorId} displayMode={displayMode} />}

      {/* Footer */}
      <div className="at-pad" style={{ padding: '0 56px 48px' }}>
        <div style={{
          paddingTop: 22, borderTop: `1px solid rgba(27,42,78,.2)`,
          fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
          fontSize: 11, color: MUTE, letterSpacing: '.08em',
          textTransform: 'uppercase',
          display: 'flex', justifyContent: 'space-between', gap: 12, flexWrap: 'wrap',
        }}>
          <a href="about.html" style={{ color: MUTE, textDecoration: 'underline', textUnderlineOffset: 3 }}>
            About the data: sources & methods
          </a>
          <span style={{ textAlign: 'right' }}>
            Data: FRED · BLS · Census · FHFA · Zillow · Freddie Mac · EIA<br/>
            economicsecurityproject.org / affordability
          </span>
        </div>
      </div>
    </div>
  );
}

window.AppMain = AppMain;
})();
</script>

<script type="text/babel" data-presets="react">
(function() {
  const { useState, useEffect } = React;

  function App() {
    const data = window.AFFORDABILITY_DATA;
    const [ready, setReady] = useState(!!window.AppMain);
    useEffect(() => {
      if (ready) return;
      const t = setInterval(() => {
        if (window.AppMain) { setReady(true); clearInterval(t); }
      }, 80);
      return () => clearInterval(t);
    }, [ready]);

    if (!data) return <div style={{ color: '#F4ECD8', padding: 40, fontFamily: 'system-ui' }}>No data loaded.</div>;
    if (!ready) return <div style={{ color: '#F4ECD8', padding: 40, fontFamily: 'system-ui' }}>Loading…</div>;

    const Main = window.AppMain;
    return (
      <div id="stage">
        <Main data={data} />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
})();
</script>

</body>
</html>
