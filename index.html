<script type="text/babel" data-presets="react">
(function() {
// Shared utilities and constants for all 3 variations
const ESP = {
  warmNavy:  '#1B2A4E',   // Anchor — reads as ESP brand navy
  warmRed:   '#E04E39',   // ESPA accent
  beige:     '#F4ECD8',   // Off-white background
  ink:       '#0E1320',
  paper:     '#FBF7EE',
  rule:      '#1B2A4E',
  mute:      '#6B6E78',
  softMute:  '#9A9CA3',
  green:     '#2E7D5B',
  amber:     '#C58A2E',
};

// Format helpers — match existing dashboard
function fmtVal(val, units = '') {
  if (units.includes('%')) return val.toFixed(2) + '%';
  if (units.includes('$') || units.toLowerCase().includes('gallon') || units.toLowerCase().includes('hour')) {
    return '$' + val.toFixed(2);
  }
  if (units.includes('Thousands')) return Math.round(val).toLocaleString();
  return val.toFixed(1);
}

// Render the card to a branded PNG by drawing directly to a canvas.
// We avoid html-to-image / DOM-cloning approaches because they were
// producing blank captures (font fallbacks not surviving the clone,
// data-URL <img> elements not decoding before snapshot, foreignObject
// CORS quirks). Drawing the chart canvas + text on a fresh canvas is
// deterministic and needs no external library.
async function downloadCardAsPNG({
  chartCanvas, item, accent, headlineText, changeText, changeColor, rangeLabel,
}) {
  if (document.fonts && document.fonts.ready) {
    try { await document.fonts.ready; } catch (e) {}
  }

  // 2x for retina-grade output; final PNG is 1440 × 1080.
  const SCALE = 2;
  const W = 1440, H = 1080;
  const canvas = document.createElement('canvas');
  canvas.width  = W * SCALE;
  canvas.height = H * SCALE;
  const ctx = canvas.getContext('2d');
  ctx.scale(SCALE, SCALE);
  ctx.textBaseline = 'alphabetic';

  const PAPER = '#FBF7EE';
  const INK   = '#0E1320';
  const NAVY  = '#1B2A4E';
  const MUTE  = '#6B6E78';
  const SOFT  = '#9A9CA3';
  const SERIF   = '"Source Serif 4", Georgia, serif';
  const DISPLAY = '"Inter Tight", system-ui, sans-serif';

  // Background
  ctx.fillStyle = PAPER;
  ctx.fillRect(0, 0, W, H);

  // ── Header band ─────────────────────────────────────────────────────────
  const padX = 80;

  // Logo box ("E")
  ctx.fillStyle = NAVY;
  ctx.fillRect(padX, 80, 56, 56);
  ctx.fillStyle = PAPER;
  ctx.font = `600 36px ${SERIF}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('E', padX + 28, 80 + 30);
  ctx.textBaseline = 'alphabetic';

  // Brand wordmark
  ctx.textAlign = 'left';
  ctx.fillStyle = NAVY;
  ctx.font = `700 28px ${DISPLAY}`;
  ctx.fillText('Economic Security Project', padX + 76, 110);
  ctx.fillStyle = MUTE;
  ctx.font = `600 14px ${DISPLAY}`;
  ctx.fillText('THE AFFORDABILITY TRACKER', padX + 76, 134);

  // Date (right side)
  ctx.textAlign = 'right';
  ctx.fillStyle = MUTE;
  ctx.font = `600 14px ${DISPLAY}`;
  const today = new Date().toLocaleDateString('en-US', {
    month: 'long', day: 'numeric', year: 'numeric',
  }).toUpperCase();
  ctx.fillText(today, W - padX, 134);

  // Header divider
  ctx.strokeStyle = 'rgba(27,42,78,.18)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(padX, 180);
  ctx.lineTo(W - padX, 180);
  ctx.stroke();

  // ── Card area ───────────────────────────────────────────────────────────
  const cardTop = 220;

  // Top accent bar (brand color of this series)
  ctx.fillStyle = accent;
  ctx.fillRect(padX, cardTop, W - padX * 2, 4);

  // Eyebrow
  const eyebrow = (item.category === 'labor'     ? 'Income'
                : item.category === 'daily'      ? 'Daily'
                : item.category === 'groceries'  ? 'Groceries'
                                                 : 'Big-ticket').toUpperCase();
  ctx.textAlign = 'left';
  ctx.fillStyle = accent;
  ctx.font = `700 18px ${DISPLAY}`;
  ctx.fillText(eyebrow, padX, cardTop + 50);

  // Title (auto-shrink if it would collide with the right-side headline)
  const headlineRightWidth = (() => {
    ctx.font = `500 76px ${SERIF}`;
    return ctx.measureText(headlineText).width;
  })();
  const titleMaxWidth = (W - padX * 2) - headlineRightWidth - 60;
  let titleSize = 56;
  ctx.fillStyle = INK;
  for (; titleSize >= 32; titleSize -= 2) {
    ctx.font = `500 ${titleSize}px ${SERIF}`;
    if (ctx.measureText(item.label).width <= titleMaxWidth) break;
  }
  ctx.fillText(item.label, padX, cardTop + 110);

  // Subtitle
  if (item.subtitle) {
    ctx.fillStyle = MUTE;
    ctx.font = `italic 22px ${SERIF}`;
    ctx.fillText(item.subtitle, padX, cardTop + 145);
  }

  // Headline value (right side)
  ctx.textAlign = 'right';
  ctx.fillStyle = INK;
  ctx.font = `500 76px ${SERIF}`;
  ctx.fillText(headlineText, W - padX, cardTop + 110);

  // Change line under headline
  ctx.fillStyle = changeColor || accent;
  ctx.font = `700 22px ${DISPLAY}`;
  ctx.fillText(changeText, W - padX, cardTop + 145);

  // ── Chart ───────────────────────────────────────────────────────────────
  if (chartCanvas) {
    let chartUrl = null;
    try { chartUrl = chartCanvas.toDataURL('image/png'); } catch (e) {}
    if (chartUrl) {
      const img = new Image();
      await new Promise((resolve) => {
        img.onload = resolve;
        img.onerror = resolve; // never block the export on a chart fail
        img.src = chartUrl;
      });
      const chartX = padX, chartY = cardTop + 200;
      const chartW = W - padX * 2, chartH = 540;
      ctx.drawImage(img, chartX, chartY, chartW, chartH);
    }
  }

  // ── Footer ──────────────────────────────────────────────────────────────
  const footerY = H - 50;
  ctx.strokeStyle = 'rgba(27,42,78,.12)';
  ctx.beginPath();
  ctx.moveTo(padX, footerY - 28);
  ctx.lineTo(W - padX, footerY - 28);
  ctx.stroke();

  ctx.fillStyle = MUTE;
  ctx.font = `600 13px ${DISPLAY}`;
  ctx.textAlign = 'left';
  ctx.fillText('ECONOMICSECURITYPROJECT.ORG', padX, footerY);
  ctx.textAlign = 'right';
  ctx.fillText(`SOURCE · FRED · ${item.fred_id}`, W - padX, footerY);

  // Trigger download
  await new Promise((resolve) => {
    canvas.toBlob((blob) => {
      if (!blob) return resolve();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${item.id}-${item.fred_id}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      resolve();
    }, 'image/png');
  });
}

function downloadCSV(item) {
  const header = 'date,value,units\n';
  const units = (item.units || '').replace(/"/g, '""');
  const body = item.data.map(r => `${r.date},${r.value},"${units}"`).join('\n');
  const csv = `# ${item.label} — FRED ${item.fred_id}\n# Source: https://fred.stlouisfed.org/series/${item.fred_id}\n${header}${body}\n`;
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${item.id}-${item.fred_id}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function fmtDate(dateInput, opts) {
  // Accept either an ISO date string ("2024-01-15") or a numeric timestamp (ms),
  // since Chart.js tooltip callbacks pass parsed.x as a number.
  const d = typeof dateInput === 'number'
    ? new Date(dateInput)
    : new Date(dateInput + 'T12:00:00');
  return d.toLocaleDateString('en-US', opts || { year: 'numeric', month: 'short' });
}

function pctChange(data, fromDate) {
  // Find value at-or-before fromDate; latest is last
  if (!data || data.length < 2) return null;
  const latest = data[data.length - 1].value;
  const cutoff = new Date(fromDate);
  let prior = null;
  for (let i = 0; i < data.length; i++) {
    if (new Date(data[i].date) <= cutoff) prior = data[i].value;
    else break;
  }
  if (prior == null || prior === 0) return null;
  return ((latest - prior) / prior) * 100;
}

function valueAt(data, dateStr) {
  // Last value on or before dateStr
  if (!data || !data.length) return null;
  const cutoff = new Date(dateStr);
  let v = null;
  for (let i = 0; i < data.length; i++) {
    if (new Date(data[i].date) <= cutoff) v = data[i].value;
    else break;
  }
  return v;
}

function rebase(data, baseDate) {
  // Return data rescaled so value at baseDate = 100
  const base = valueAt(data, baseDate);
  if (!base) return data.map(d => ({ ...d, value: 100 }));
  return data.map(d => ({ date: d.date, value: (d.value / base) * 100 }));
}

function sliceFrom(data, fromDateStr) {
  const cutoff = new Date(fromDateStr);
  return data.filter(d => new Date(d.date) >= cutoff);
}

// Build a smoothed SVG line path
function linePath(points, w, h) {
  if (!points.length) return '';
  return points.map((p, i) => (i === 0 ? `M${p.x.toFixed(1)},${p.y.toFixed(1)}` : `L${p.x.toFixed(1)},${p.y.toFixed(1)}`)).join(' ');
}

function areaPath(points, w, h) {
  if (!points.length) return '';
  const top = points.map((p, i) => (i === 0 ? `M${p.x.toFixed(1)},${p.y.toFixed(1)}` : `L${p.x.toFixed(1)},${p.y.toFixed(1)}`)).join(' ');
  return `${top} L${points[points.length - 1].x.toFixed(1)},${h} L${points[0].x.toFixed(1)},${h} Z`;
}

// Map data series to SVG points
function toPoints(data, w, h, opts = {}) {
  if (!data || data.length === 0) return [];
  const pad = opts.pad || 4;
  const vals = data.map(d => d.value);
  const min = opts.min ?? Math.min(...vals);
  const max = opts.max ?? Math.max(...vals);
  const range = max - min || 1;
  return data.map((d, i) => ({
    x: (i / (data.length - 1 || 1)) * w,
    y: h - pad - ((d.value - min) / range) * (h - pad * 2),
    v: d.value,
    date: d.date,
  }));
}

// Useful event annotations for long-running charts
const EVENTS = [
  { date: '2008-09-01', label: 'Financial crisis' },
  { date: '2020-03-01', label: 'COVID shock' },
  { date: '2022-06-01', label: 'Inflation peak' },
];

// Hours of work needed at avg hourly earnings to afford X
function hoursToAfford(price, wage) {
  if (!wage) return null;
  return price / wage;
}

// Convert a CPI level into a real-dollar price (illustrative anchor)
// We use bureau-published reference points where useful.
const REFERENCE_PRICES = {
  // Approx avg US weekly grocery bill for a family of 4 in 2025 ≈ $290 (USDA moderate plan, scaled)
  groceriesWeekly2025: 290,
  // Median US rent 2025 ≈ $1,540
  rentMonthly2025: 1540,
  // Median home price 2025 ≈ $420k
  homePrice2025: 420000,
};

// For a CPI series, scale a reference price by the ratio of CPI(date) / CPI(2025-01)
function scaleByCPI(series, date, refPrice, anchorDate = '2025-01-01') {
  const at = valueAt(series, date);
  const anchor = valueAt(series, anchorDate);
  if (!at || !anchor) return null;
  return refPrice * (at / anchor);
}

Object.assign(window, {
  ESP, fmtVal, fmtDate, pctChange, valueAt, rebase, sliceFrom, downloadCSV, downloadCardAsPNG,
  linePath, areaPath, toPoints, EVENTS, hoursToAfford, REFERENCE_PRICES, scaleByCPI,
});

})();
</script>

const { useState, useMemo, useEffect, useRef } = React;

const FILTERS = [
  { id: 'daily',     label: 'Daily items',  matches: (it) => it.category === 'daily' },
  { id: 'big',       label: 'Big-ticket',   matches: (it) => it.category === 'big' },

];

// ── Per-series annotations ────────────────────────────────────────────────

const BEIGE = '#F4ECD8';

const MUTE = '#6B6E78';
const SOFT = '#9A9CA3';

// Lazy-load Chart.js + date adapter once
let chartJsPromise = null;
function loadChartJs() {
  if (chartJsPromise) return chartJsPromise;
  chartJsPromise = new Promise((resolve, reject) => {
    if (window.Chart) return resolve(window.Chart);
    const s1 = document.createElement('script');
    s1.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js';
    s1.onload = () => {
      const s2 = document.createElement('script');
      s2.src = 'https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js';
      s2.onload = () => resolve(window.Chart);
      s2.onerror = reject;
      document.head.appendChild(s2);
    };
    s1.onerror = reject;
    document.head.appendChild(s1);
  });
  return chartJsPromise;
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Hero stats ──────────────────────────────────────────────────────────────
function HeroStat({ label, value, sub }) {
  return (
    <div>
      <div style={{
        fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
        fontSize: 11, letterSpacing: '.18em', textTransform: 'uppercase',

// ── Interactive Chart.js card ───────────────────────────────────────────────
// Transparent background, soft area fill, hover tooltip — matches original index.html.
function ChartCard({ item, since }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  const cardRef = useRef(null);
  const [chartReady, setChartReady] = useState(!!window.Chart);
  const accent = item.color || (item.category === 'labor' ? NAVY : WARM_RED);

  // Per-card date range. Default matches the global "since 2020" framing.
  const RANGE_OPTIONS = [
    { id: '1Y',     label: '1Y',     yearsAgo: 1 },
    { id: '2025',   label: 'Since 2025', sinceDate: '2025-01-01' },
    { id: '2020',   label: 'Since 2020', sinceDate: '2020-01-01' },
    { id: '10Y',    label: '10Y',    yearsAgo: 10 },
    { id: 'Max',    label: 'Max',    yearsAgo: null },
  ];
  const [rangeId, setRangeId] = useState('2020');
  const activeRange = RANGE_OPTIONS.find(r => r.id === rangeId) || RANGE_OPTIONS[2];
  const cardSince = (() => {
    if (activeRange.sinceDate) return activeRange.sinceDate;
    if (activeRange.yearsAgo == null) return item.data[0]?.date || since;
    const d = new Date();
    d.setFullYear(d.getFullYear() - activeRange.yearsAgo);
    return d.toISOString().slice(0, 10);
  })();

  // Slice + (optionally) rebase to % change since the first visible point.
  // Index series (item.rebase) get rebased so the chart y-axis reads as a
  // cumulative percent change over the active range; everything else stays
  // in its native units ($, %, etc.).
  const visibleData  = sliceFrom(item.data, cardSince);
  const v0           = (item.rebase && visibleData.length) ? visibleData[0].value : null;
  const displayData  = item.rebase
    ? visibleData.map(d => ({ date: d.date, value: v0 ? (d.value / v0 - 1) * 100 : 0 }))
    : visibleData;
  const displayUnits = item.rebase
    ? `% change since ${fmtDate(visibleData[0]?.date || cardSince, { year: 'numeric', month: 'short' })}`
    : item.units;
  const headlineVal  = item.rebase
    ? (displayData.length ? displayData[displayData.length - 1].value : 0)
    : item.latest_value;

  useEffect(() => {
    loadChartJs().then(() => setChartReady(true));
  }, []);

  useEffect(() => {
    if (!chartReady || !canvasRef.current) return;
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }

    const ctx = canvasRef.current.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 180);
    grad.addColorStop(0, hexToRgba(accent, 0.22));
    grad.addColorStop(0.7, hexToRgba(accent, 0.04));
    grad.addColorStop(1, hexToRgba(accent, 0));

    const annotations = ANNOTATIONS[item.id] || [];

    // Tight, round-numbered y-axis bounds. Pick a "nice" step (1/2/5 × 10ⁿ)
    // sized for the data range, then snap min/max to multiples of it. This
    // keeps the axis close to the data without leaving Chart.js's tick
    // chooser to pick arbitrary numbers inside narrow bounds.
    const yVals = displayData.map(d => d.value).filter(v => Number.isFinite(v));
    const dataMin = yVals.length ? Math.min(...yVals) : 0;
    const dataMax = yVals.length ? Math.max(...yVals) : 1;
    const dataRange = (dataMax - dataMin) || Math.max(Math.abs(dataMax), 1);
    const targetTicks = 4;
    const roughStep = dataRange / Math.max(targetTicks - 1, 1);
    const stepExp = Math.floor(Math.log10(roughStep));
    const stepFrac = roughStep / Math.pow(10, stepExp);
    const niceFrac = stepFrac < 1.5 ? 1 : stepFrac < 3 ? 2 : stepFrac < 7 ? 5 : 10;
    const yStep = niceFrac * Math.pow(10, stepExp);
    const yMin = Math.floor(dataMin / yStep) * yStep;
    const yMax = Math.ceil(dataMax / yStep) * yStep;

    // Plugin: draw annotation pins + labels
    const annotationPlugin = {
      id: 'esp-annotations',
      afterDatasetsDraw(chart) {
        if (!annotations.length) return;
        const { ctx, chartArea, scales } = chart;
        const { left, right, top } = chartArea;
        ctx.save();
        ctx.font = '600 9px "Inter Tight", system-ui, sans-serif';
        ctx.textBaseline = 'middle';

        annotations.forEach((ann, i) => {
          const t = new Date(ann.date).getTime();
          const x = scales.x.getPixelForValue(t);
          if (x < left || x > right) return;

          const datasetData = chart.data.datasets[0].data;
          let nearest = datasetData[0];
          let minDist = Infinity;
          for (const d of datasetData) {
            const dist = Math.abs(new Date(d.x).getTime() - t);
            if (dist < minDist) { minDist = dist; nearest = d; }
          }
          const y = scales.y.getPixelForValue(nearest.y);

          // Vertical hairline
          ctx.strokeStyle = hexToRgba(NAVY, 0.35);
          ctx.lineWidth = 1;
          ctx.setLineDash([2, 3]);
          ctx.beginPath();
          ctx.moveTo(x, y - 4);
          ctx.lineTo(x, top + 4);
          ctx.stroke();
          ctx.setLineDash([]);

          // Pin dot
          ctx.fillStyle = NAVY;
          ctx.beginPath();
          ctx.arc(x, y, 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = PAPER;
          ctx.beginPath();
          ctx.arc(x, y, 1.5, 0, Math.PI * 2);
          ctx.fill();

          // Label tucked at the top
          const text = ann.label.toUpperCase();
          const textW = ctx.measureText(text).width;
          const labelY = top + 9 + (i % 2) * 14;
          const labelX = Math.max(left + textW / 2 + 4, Math.min(right - textW / 2 - 4, x));
          const padX = 5, padY = 3;
          ctx.fillStyle = PAPER;
          ctx.strokeStyle = hexToRgba(NAVY, 0.4);
          ctx.lineWidth = 1;
          ctx.fillRect(labelX - textW / 2 - padX, labelY - 6 - padY, textW + padX * 2, 12 + padY * 2 - 4);
          ctx.strokeRect(labelX - textW / 2 - padX, labelY - 6 - padY, textW + padX * 2, 12 + padY * 2 - 4);

          ctx.fillStyle = NAVY;
          ctx.textAlign = 'center';
          ctx.fillText(text, labelX, labelY);
        });
        ctx.restore();
      },
    };

    chartRef.current = new window.Chart(ctx, {
      type: 'line',
      data: {
        datasets: [{
          label: item.label,
          data: displayData.map(d => ({ x: d.date, y: d.value })),
          borderColor: accent,
          backgroundColor: grad,
          borderWidth: 1.8,
          pointRadius: 0,
          pointHoverRadius: 5,
          pointHoverBackgroundColor: accent,
          pointHoverBorderColor: PAPER,
          pointHoverBorderWidth: 2,
          tension: 0.32,
          fill: 'start',
        }],
      },
      plugins: [annotationPlugin],
      options: {
        responsive: true,
        maintainAspectRatio: false,
        layout: { padding: { top: annotations.length ? 30 : 8 } },
        animation: { duration: 350, easing: 'easeOutQuart' },
        interaction: { intersect: false, mode: 'index' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: NAVY,
            titleColor: '#9BA8C2',
            bodyColor: PAPER,
            borderColor: 'rgba(244,236,216,.15)',
            borderWidth: 1,
            padding: 11,
            cornerRadius: 4,
            displayColors: false,
            titleFont: { size: 10, family: 'Inter Tight, system-ui', weight: '600' },
            bodyFont:  { size: 13, family: 'Source Serif 4, Georgia, serif', weight: '600' },
            callbacks: {
              title: (c) => fmtDate(c[0].parsed.x, { year: 'numeric', month: 'long' }),
              label: (c) => '  ' + fmtVal(c.parsed.y, displayUnits),
            },
          },
        },
        scales: {
          x: {
            type: 'time',
            time: { unit: activeRange.id === '1Y' ? 'month' : activeRange.id === '5Y' ? 'year' : 'year' },
            grid: { display: false },
            border: { display: false },
            ticks: {
              color: MUTE,
              font: { size: 10, family: 'Inter Tight, system-ui' },
              maxTicksLimit: activeRange.id === '1Y' ? 6 : 5,
            },
          },
          y: {
            position: 'right',
            min: yMin,
            max: yMax,
            grid: { color: 'rgba(27,42,78,.08)', drawTicks: false },
            border: { display: false },
            ticks: {
              color: MUTE,
              font: { size: 10, family: 'Inter Tight, system-ui' },
              stepSize: yStep,
              callback: (v) => fmtVal(v, displayUnits),
            },
          },
        },
      },
    });

    return () => {
      if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    };
  }, [chartReady, item, cardSince, accent]);

  const change = pctChange(item.data, cardSince);
  const up = change != null && change >= 0;

  return (
    <div ref={cardRef} style={{
      background: 'transparent',
      borderTop: `2px solid ${accent}`,
      padding: '18px 22px 16px',
      display: 'flex', flexDirection: 'column', gap: 12,
    }}>
      {/* Header */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12 }}>
        <div style={{ minWidth: 0, flex: 1 }}>
          <div style={{
            fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
            fontSize: 10, letterSpacing: '.18em', textTransform: 'uppercase',
            fontWeight: 700, color: accent, marginBottom: 4,
          }}>{item.category === 'labor' ? 'Income' : item.category === 'daily' ? 'Daily' : item.category === 'groceries' ? 'Groceries' : 'Big-ticket'}</div>
          <div style={{
            fontFamily: 'Publico, Georgia, serif',
            fontSize: 20, fontWeight: 500, lineHeight: 1.15, color: INK,
          }}>{item.label}</div>
          <div style={{
            fontSize: 12, color: MUTE, marginTop: 3,
            fontFamily: 'Publico, Georgia, serif', fontStyle: 'italic',
          }}>{item.subtitle}</div>
        </div>
        <div style={{ textAlign: 'right', flexShrink: 0 }}>
          <div style={{
            fontFamily: 'Publico, Georgia, serif',
            fontSize: 28, fontWeight: 500, lineHeight: 1, color: INK,
          }}>{item.rebase ? (headlineVal >= 0 ? '+' : '') + headlineVal.toFixed(1) + '%' : fmtVal(headlineVal, displayUnits)}</div>
          <div style={{
            fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
            fontSize: 11, fontWeight: 700, marginTop: 6,
            color: up ? WARM_RED : '#2E7D5B',
          }}>{item.rebase
              ? (up ? '↑ ' : '↓ ') + (activeRange.id === '2020' ? 'since 2020' : activeRange.id === '2025' ? 'since 2025' : activeRange.id === 'Max' ? 'all-time' : `over ${activeRange.label}`)
              : (up ? '↑ +' : '↓ ') + Math.abs(change || 0).toFixed(1) + '% ' + (activeRange.id === '2020' ? 'since 2020' : activeRange.id === '2025' ? 'since 2025' : activeRange.id === 'Max' ? 'all-time' : `over ${activeRange.label}`)}</div>
        </div>
      </div>

      {/* Range buttons */}
      <div className="at-range-row" style={{
        display: 'flex', gap: 4, alignItems: 'center',
        margin: '6px 0 -4px',
      }}>
        {RANGE_OPTIONS.map(r => {
          const on = r.id === rangeId;
          return (
            <button
              key={r.id}
              onClick={() => setRangeId(r.id)}
              style={{
                fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
                fontSize: 10, fontWeight: 600, letterSpacing: '.05em',
                background: on ? NAVY : 'transparent',
                color: on ? PAPER : MUTE,
                border: `1px solid ${on ? NAVY : 'rgba(27,42,78,.18)'}`,
                padding: '3px 8px',
                cursor: 'pointer',
                transition: 'all .12s',
              }}
            >{r.label}</button>
          );
        })}
      </div>

      {/* Chart */}
      <div style={{ height: 240, position: 'relative' }}>
        <canvas ref={canvasRef} />
      </div>

      {/* Footer */}
      <div style={{
        fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
        fontSize: 9, color: SOFT, letterSpacing: '.1em',
        textTransform: 'uppercase',
        paddingTop: 8, borderTop: `1px solid rgba(27,42,78,.1)`,
        display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12,
      }}>
        <a
          href={`https://fred.stlouisfed.org/series/${item.fred_id}`}
          target="_blank"
          rel="noopener noreferrer"
          style={{ color: SOFT, textDecoration: 'none', borderBottom: '1px dotted rgba(27,42,78,.3)' }}
          onMouseEnter={(e) => { e.currentTarget.style.color = NAVY; }}
          onMouseLeave={(e) => { e.currentTarget.style.color = SOFT; }}
        >
          Source · FRED · {item.fred_id} ↗
        </a>
        <span style={{ display: 'flex', gap: 8, alignItems: 'center' }} data-export-hide>
          <span>{item.units}</span>
          <button
            onClick={() => downloadCSV(item)}
            style={{
              fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
              fontSize: 9, fontWeight: 700, letterSpacing: '.1em', textTransform: 'uppercase',
              background: 'transparent', color: NAVY,
              border: `1px solid rgba(27,42,78,.25)`,
              padding: '3px 7px', cursor: 'pointer',
              display: 'inline-flex', alignItems: 'center', gap: 4,
            }}
            onMouseEnter={(e) => { e.currentTarget.style.background = NAVY; e.currentTarget.style.color = PAPER; }}
            onMouseLeave={(e) => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = NAVY; }}
          >↓ CSV</button>
          <button
            onClick={async () => {
              const chartCanvas = cardRef.current?.querySelector('canvas');
              const headlineText = item.rebase
                ? (headlineVal >= 0 ? '+' : '') + headlineVal.toFixed(1) + '%'
                : fmtVal(headlineVal, displayUnits);
              const rangeLabel = activeRange.id === '2020' ? 'since 2020'
                : activeRange.id === '2025' ? 'since 2025'
                : activeRange.id === 'Max'  ? 'all-time'
                : `over ${activeRange.label}`;
              const changeText = item.rebase
                ? (up ? '↑ ' : '↓ ') + rangeLabel
                : (up ? '↑ +' : '↓ ') + Math.abs(change || 0).toFixed(1) + '% ' + rangeLabel;
              const changeColor = up ? WARM_RED : '#2E7D5B';
              try {
                await downloadCardAsPNG({
                  chartCanvas, item, accent,
                  headlineText, changeText, changeColor, rangeLabel,
                });
              } catch (err) { console.error('PNG export failed', err); }
            }}
            style={{
              fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
              fontSize: 9, fontWeight: 700, letterSpacing: '.1em', textTransform: 'uppercase',
              background: 'transparent', color: NAVY,
              border: `1px solid rgba(27,42,78,.25)`,
              padding: '3px 7px', cursor: 'pointer',
              display: 'inline-flex', alignItems: 'center', gap: 4,
            }}
            onMouseEnter={(e) => { e.currentTarget.style.background = NAVY; e.currentTarget.style.color = PAPER; }}
            onMouseLeave={(e) => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = NAVY; }}
          >↓ PNG</button>
        </span>
      </div>
    </div>
  );
}

// ── YoY heatmap ─────────────────────────────────────────────────────────────
function Heatmap({ items }) {
  const years = [2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025, 2026];

  const matrix = items.map(item => ({
    item,
    cells: years.map(yr => {
      const cur = valueAt(item.data, `${yr}-01-15`);
      const prior = valueAt(item.data, `${yr - 1}-01-15`);
      if (!cur || !prior) return null;
      return ((cur - prior) / prior) * 100;
    }),
  }));

  const color = (v) => {
    if (v == null) return BEIGE;
    const clamp = Math.max(-15, Math.min(15, v));
    const a = Math.abs(clamp) / 15;
    if (clamp > 0) {
      const lerp = (s, e) => Math.round(s + (e - s) * a);
      return `rgb(${lerp(244, 224)},${lerp(236, 78)},${lerp(216, 57)})`;
    } else {
      const lerp = (s, e) => Math.round(s + (e - s) * a);
      return `rgb(${lerp(244, 46)},${lerp(236, 125)},${lerp(216, 91)})`;
    }
  };
  const textColor = (v) => v == null ? MUTE : (Math.abs(v) > 7 ? PAPER : INK);

  if (!items.length) {
    return (
      <div style={{
        background: PAPER, border: `1px solid rgba(27,42,78,.18)`,
        padding: '32px', textAlign: 'center',
        fontFamily: 'Publico, Georgia, serif', fontStyle: 'italic', color: MUTE,
      }}>
        Select at least one metric above to see the year-by-year breakdown.
      </div>
    );
  }

  return (
    <div style={{ background: PAPER, border: `1px solid rgba(27,42,78,.18)`, padding: '24px' }}>
      <div style={{
        display: 'flex', justifyContent: 'flex-end', alignItems: 'center', gap: 8,
        fontSize: 10, color: MUTE, marginBottom: 14,
        fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif', letterSpacing: '.1em',
      }}>
        <span>−15%</span>
        <div style={{ width: 120, height: 10,
          background: `linear-gradient(90deg, ${color(-15)}, ${color(0)}, ${color(15)})` }} />
        <span>+15%</span>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: `220px repeat(${years.length}, 1fr)`, gap: 2 }}>
        <div></div>
        {years.map(yr => (
          <div key={yr} style={{
            textAlign: 'center', fontSize: 11,
            fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
            fontWeight: 700, color: INK, padding: '0 0 6px',
          }}>{yr}</div>
        ))}
        {matrix.map(row => (
          <React.Fragment key={row.item.id}>
            <div style={{
              padding: '12px 8px', fontSize: 13, fontWeight: 600, color: INK,
              fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
            }}>
              {row.item.label}
              <div style={{ fontSize: 10, color: MUTE, fontWeight: 400, marginTop: 2 }}>
                {row.item.subtitle}
              </div>
            </div>
            {row.cells.map((v, i) => (
              <div key={i} style={{
                background: color(v), color: textColor(v),
                padding: '12px 4px', textAlign: 'center',
                fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
                fontSize: 13, fontWeight: 700,
              }}>
                {v == null ? '—' : `${v >= 0 ? '+' : ''}${v.toFixed(1)}`}
              </div>
            ))}
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

// ── Main V3 ─────────────────────────────────────────────────────────────────

    new Set(allItems.filter(i => i.category === 'daily').map(i => i.id))
  );

  const filter = FILTERS.find(f => f.id === filterId) || FILTERS[0];
  const visibleItems = useMemo(() => allItems.filter(filter.matches), [allItems, filter]);
  const selectedItems = useMemo(
    () => allItems.filter(i => selectedIds.has(i.id)),
    [allItems, selectedIds]
  );

  // When filter changes, auto-select everything in that filter.
  useEffect(() => {
    setSelectedIds(new Set(visibleItems.map(i => i.id)));
  }, [filterId]); // intentionally only on filter change

        <h1 className="at-h1" style={v3Styles.h1}>What's gotten<br/>more expensive.</h1>
        <p className="at-dek" style={v3Styles.dek}>
          A long, careful look at the federal price data. Built for the people
          who write about it, organize around it, and have to live inside it.
        </p>
        {(() => {
          const stamps = allItems.map(d => d.last_updated).filter(Boolean).sort();
          const latest = stamps.length ? stamps[stamps.length - 1] : null;
          if (!latest) return null;
          const formatted = new Date(latest + 'T12:00:00').toLocaleDateString('en-US', {
            year: 'numeric', month: 'long', day: 'numeric',
          });
          return (
            <div style={{
              marginTop: 22,
              fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
              fontSize: 12, letterSpacing: '.18em', textTransform: 'uppercase',
              color: 'rgba(244,238,225,.6)', fontWeight: 600,
            }}>
              Last updated · {formatted}
            </div>
          );
        })()}

        {/* Filter pills — inside the hero, end of hero */}
        <div style={{
          display: 'flex', alignItems: 'center', gap: 18, flexWrap: 'wrap',
          marginTop: 40,
        }}>
          <span style={{
            fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
            fontSize: 14, letterSpacing: '.18em', textTransform: 'uppercase',
            color: 'rgba(244,238,225,.75)', fontWeight: 700,
          }}>Filter</span>
          <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
            {FILTERS.map(f => {
              const count = allItems.filter(f.matches).length;
              const active = f.id === filterId;
              return (
                <button
                  key={f.id}
                  onClick={() => setFilterId(f.id)}
                  style={{
                    fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
                    fontSize: 17, fontWeight: active ? 700 : 600,
                    background: active ? PAPER : 'transparent',
                    color: active ? NAVY : 'rgba(244,238,225,.9)',
                    border: `1.5px solid ${active ? PAPER : 'rgba(244,238,225,.32)'}`,
                    padding: '13px 24px',
                    cursor: 'pointer',
                    display: 'inline-flex', alignItems: 'center', gap: 12,
                    transition: 'all .15s',
                    boxShadow: active ? '0 2px 0 rgba(0,0,0,.18)' : 'none',
                  }}
                >
                  {f.label}
                  <span style={{
                    fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
                    fontSize: 13, fontWeight: 700,
                    background: active ? 'rgba(27,42,78,.12)' : 'rgba(244,238,225,.16)',
                    color: active ? NAVY : 'rgba(244,238,225,.85)',
                    padding: '3px 10px', borderRadius: 10,
                  }}>{count}</span>
                </button>
              );
            })}
          </div>
          <span style={{
            fontFamily: 'Publico, Georgia, serif', fontSize: 13, fontStyle: 'italic',
            color: 'rgba(244,238,225,.6)', marginLeft: 'auto',
          }}>{filterContext}</span>
        </div>

      </header>

      {/* Per-item checkboxes */}
      <div className="at-pad" style={v3Styles.checkBar}>
        <span style={v3Styles.checkLabel}>Show</span>
        {visibleItems.map(item => {
          const on = selectedIds.has(item.id);
          const accent = item.color || (item.category === 'labor' ? NAVY : WARM_RED);
          return (
            <button key={item.id} onClick={() => toggleId(item.id)} style={v3Styles.checkChip(on, accent)}>
              <span style={v3Styles.checkBox(on, accent)}>{on ? '✓' : ''}</span>
              {item.label}
            </button>
          );
        })}
        <button onClick={allOn ? clearAll : selectAll} style={v3Styles.toggleAll}>
          {allOn ? 'Clear all' : 'Select all'}
        </button>
      </div>

      {/* Body */}
      <div className="at-pad" style={{ padding: '36px 56px 56px' }}>
        {/* Charts grid */}
        <div className="at-section-head" style={v3Styles.sectionHead}>
          <span style={v3Styles.sectionLabel}>§01</span>
          <span style={v3Styles.sectionTitle}>
            {visibleSelected.length === 0
              ? 'Nothing selected'
              : visibleSelected.length === 1
                ? visibleSelected[0].label
                : `${visibleSelected.length} metrics, since 2020`}
          </span>
          <span className="at-section-dek" style={v3Styles.sectionDek}>Hover any chart for monthly values.</span>
        </div>

        {visibleSelected.length === 0 ? (
          <div style={{
            background: PAPER, border: `1px solid rgba(27,42,78,.18)`,
            padding: '48px 32px', textAlign: 'center',
            fontFamily: 'Publico, Georgia, serif', fontStyle: 'italic', color: MUTE,
          }}>
            Pick one or more metrics above to see them charted.
          </div>
        ) : (
          <div className="at-cards-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(420px, 1fr))', gap: 0,
            border: `1px solid rgba(27,42,78,.14)`, background: 'transparent' }}>
            {visibleSelected.map((item, i) => {
              const col = i % 2;
              const row = Math.floor(i / 2);
              const total = visibleSelected.length;
              const lastRow = Math.floor((total - 1) / 2);
              return (
                <div key={item.id} className="at-card" style={{
                  borderRight: col < 1 ? `1px solid rgba(27,42,78,.14)` : 'none',
                  borderBottom: row < lastRow ? `1px solid rgba(27,42,78,.14)` : 'none',
                }}>
                  <ChartCard item={item} since={since} />
                </div>
              );
            })}
          </div>
        )}

        {/* Heatmap */}
        <div className="at-section-head" style={{ ...v3Styles.sectionHead, marginTop: 48 }}>
          <span style={v3Styles.sectionLabel}>§02</span>
          <span style={v3Styles.sectionTitle}>Year by year</span>
          <span className="at-section-dek" style={v3Styles.sectionDek}>YoY % change in January, for the metrics you've selected.</span>
        </div>
        <div className="at-heatmap-scroll">
          <Heatmap items={visibleSelected} />
        </div>

        {/* Footer */}
        <div style={{
          marginTop: 48, paddingTop: 22, borderTop: `1px solid rgba(27,42,78,.2)`,
          fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
          fontSize: 11, color: MUTE, letterSpacing: '.08em',
          textTransform: 'uppercase', textAlign: 'right',
        }}>
          Data: FRED · BLS · Freddie Mac · EIA<br/>
          economicsecurityproject.org / affordability
        </div>
      </div>
    </div>
  );
}

window.V3 = V3;
})();

</script>

<script type="text/babel" data-presets="react">
(function() {
  const { useState, useEffect } = React;

  function App() {
    const data = window.AFFORDABILITY_DATA;
    const [ready, setReady] = useState(!!window.V3);
    useEffect(() => {
      if (ready) return;
      const t = setInterval(() => {
        if (window.V3) { setReady(true); clearInterval(t); }
      }, 80);
      return () => clearInterval(t);
    }, [ready]);

    if (!data) return <div style={{ color: '#F4ECD8', padding: 40, fontFamily: 'system-ui' }}>No data loaded.</div>;
    if (!ready) return <div style={{ color: '#F4ECD8', padding: 40, fontFamily: 'system-ui' }}>Loading…</div>;

    return (
      <div id="stage">
        <V3 data={data} />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
})();
</script>

</body>
</html>
