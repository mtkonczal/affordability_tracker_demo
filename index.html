// ── National view ────────────────────────────────────────────────────────────
function NationalView({ data, anchorId, displayMode, priceType }) {
  const cpiData = data.cpi_all_items ? data.cpi_all_items.data : null;
  const allItems = useMemo(
    () => Object.values(data).filter(i => !i.overlay_only),
    [data]
  );
  const byCategory = useMemo(() => {
    const m = {};
    CATEGORY_META.forEach(c => {
      m[c.id] = allItems
        .filter(i => i.category === c.id)
        .sort((a, b) => a.label.localeCompare(b.label)); // alphabetical chips
    });
    return m;
  }, [allItems]);

  const [selectedIds, setSelectedIds] = useState(() =>
    new Set(allItems.filter(i => i.category === 'daily').map(i => i.id))
  );

  // Collapsible category rows (41 chips was too busy): rows start collapsed,
  // showing just the pill + a selected count; the chevron expands the chips.
  const [openCats, setOpenCats] = useState(() => new Set());
  const toggleOpen = (id) => {
    setOpenCats(prev => {
      const n = new Set(prev);
      if (n.has(id)) n.delete(id); else n.add(id);
      return n;
    });
  };

  const toggleId = (id) => {
    setSelectedIds(prev => {
      const n = new Set(prev);
      if (n.has(id)) n.delete(id); else n.add(id);
      return n;
    });
  };

  // Category pills are additive bulk toggles: clicking one adds (or removes)
  // its items without touching what's selected elsewhere — the comms team's
  // "let me throw groceries in with Big Ticket" request. Every chip stays
  // visible; unselected ones are grayed, not hidden.
  const catState = (catId) => {
    const items = byCategory[catId] || [];
    const on = items.filter(i => selectedIds.has(i.id)).length;
    return on === 0 ? 'none' : on === items.length ? 'all' : 'some';
  };
  const toggleCategory = (catId) => {
    const items = byCategory[catId] || [];
    const state = catState(catId);
    setSelectedIds(prev => {
      const n = new Set(prev);
      if (state === 'all') items.forEach(i => n.delete(i.id));
      else items.forEach(i => n.add(i.id));
      return n;
    });
  };

  // Cards render in category order, alphabetical within each category —
  // matching the chip rows above.
  const selectedItems = CATEGORY_META.flatMap(c =>
    (byCategory[c.id] || []).filter(i => selectedIds.has(i.id)));
  const anchor = anchorById(anchorId);

  return (
    <React.Fragment>
      {/* Selection chips, grouped by category with family colors */}
      <div className="at-pad" style={{
        background: PAPER, borderBottom: `1px solid rgba(27,42,78,.18)`,
        padding: '16px 56px 18px',
        display: 'flex', flexDirection: 'column', gap: 10,
      }}>
        {CATEGORY_META.map(cat => {
          const items = byCategory[cat.id] || [];
          const nOn = items.filter(i => selectedIds.has(i.id)).length;
          const open = openCats.has(cat.id);
          return (
            <div key={cat.id} style={{ borderBottom: '1px solid rgba(27,42,78,.08)', paddingBottom: open ? 12 : 6 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <button onClick={() => toggleCategory(cat.id)}
                        title="Select or clear every metric in this category"
                        style={{ ...styles.catPill(catState(cat.id)), width: 130, textAlign: 'center' }}>
                  {cat.label}
                </button>
                <button
                  onClick={() => toggleOpen(cat.id)}
                  aria-expanded={open}
                  title={open ? 'Hide the metrics in this category' : 'Show the metrics in this category'}
                  style={{
                    flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                    gap: 10, background: 'transparent', border: 'none', cursor: 'pointer',
                    padding: '6px 4px', textAlign: 'left',
                  }}
                >
                  <span style={{
                    fontFamily: 'Publico, Georgia, serif', fontStyle: 'italic',
                    fontSize: 12.5, color: nOn ? INK : MUTE,
                  }}>
                    {nOn ? `${nOn} of ${items.length} selected` : `${items.length} metrics`}
                  </span>
                  <span style={{
                    fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
                    fontSize: 11, fontWeight: 700, color: NAVY, flexShrink: 0,
                  }}>{open ? '▴ Hide' : '▾ Show'}</span>
                </button>
              </div>
              {open && (
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap', marginTop: 8 }}>
                  {items.map(item => {
                    const on = selectedIds.has(item.id);
                    return (
                      <button key={item.id} onClick={() => toggleId(item.id)} style={styles.checkChip(on, item.color || WARM_RED)}>
                        <span style={styles.checkBox(on, item.color || WARM_RED)}>{on ? '✓' : ''}</span>
                        {item.label}
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
        <div style={{ display: 'flex', gap: 16, marginTop: 2 }}>
          <button
            onClick={() => setSelectedIds(new Set(allItems.map(i => i.id)))}
            style={{ ...styles.smallBtn, border: 'none', textDecoration: 'underline', textUnderlineOffset: 3, fontSize: 10 }}
          >Select all</button>
          <button
            onClick={() => setSelectedIds(new Set())}
            style={{ ...styles.smallBtn, border: 'none', textDecoration: 'underline', textUnderlineOffset: 3, fontSize: 10 }}
          >Clear all</button>
        </div>
      </div>

      <div className="at-pad" style={{ padding: '36px 56px 56px' }}>
        <HoursToAfford data={data} />

        <div className="at-section-head" style={styles.sectionHead}>
          <span style={styles.sectionLabel}>§01</span>
          <span style={styles.sectionTitle}>
            {selectedItems.length === 0
              ? 'Nothing selected'
              : selectedItems.length === 1
                ? selectedItems[0].label
                : `${selectedItems.length} metrics, ${anchor.phrase}`}
          </span>
          <span className="at-section-dek" style={styles.sectionDek}>Hover any chart for monthly values.</span>
        </div>

        {selectedItems.length === 0 ? (
          <div style={{
            background: PAPER, border: `1px solid rgba(27,42,78,.18)`,
            padding: '48px 32px', textAlign: 'center',
            fontFamily: 'Publico, Georgia, serif', fontStyle: 'italic', color: MUTE,
          }}>
            Pick one or more metrics above to see them charted.
          </div>
        ) : (
          <div className="at-cards-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(420px, 1fr))', gap: 0,
            border: `1px solid rgba(27,42,78,.14)`, background: 'transparent' }}>
            {selectedItems.map((item, i) => {
              const col = i % 2;
              const row = Math.floor(i / 2);
              const total = selectedItems.length;
              const lastRow = Math.floor((total - 1) / 2);
              return (
                <div key={item.id} className="at-card" style={{
                  borderRight: col < 1 ? `1px solid rgba(27,42,78,.14)` : 'none',
                  borderBottom: row < lastRow ? `1px solid rgba(27,42,78,.14)` : 'none',
                }}>
                  <ChartCard item={item} anchorId={anchorId} displayMode={displayMode}
                             priceType={priceType} cpiData={cpiData} />
                </div>
              );
            })}
          </div>
        )}

        <div className="at-section-head" style={{ ...styles.sectionHead, marginTop: 48 }}>
          <span style={styles.sectionLabel}>§02</span>
          <span style={styles.sectionTitle}>Year by year</span>
          <span className="at-section-dek" style={styles.sectionDek}>YoY % change each January, plus the two anchors, for the metrics you've selected.</span>
        </div>
        <div className="at-heatmap-scroll">
          <Heatmap items={selectedItems} priceType={priceType} cpiData={cpiData} />
        </div>
      </div>
    </React.Fragment>
  );
}

// ── State view: all metrics for one state, each vs. the US ──────────────────
function fmtAnnual(value, units) {
  if ((units || '').includes('%')) return Number(value).toFixed(1) + '%';
  if ((units || '').includes('$')) return '$' + Math.round(Number(value)).toLocaleString();
  return Number(value).toLocaleString();
}

function StateView({ data, code, setCode, anchorId, displayMode, priceType }) {
  const cpiData = data.cpi_all_items ? data.cpi_all_items.data : null;
  const idx = window.AFFORDABILITY_STATES;
  const isUS = code === 'US';
  const [status, setStatus] = useState('loading');

  useEffect(() => {
    let live = true;
    if (code === 'US') { setStatus('ready'); return; } // national data is already loaded
    setStatus('loading');
    loadDataFile(`data/states/${code.toLowerCase()}.js`)
      .then(() => { if (live) setStatus('ready'); })
      .catch(() => { if (live) setStatus('error'); });
    return () => { live = false; };
  }, [code]);

  // "United States" is just another option in the picker (comms request) —
  // its metric series come from the already-loaded national payload.
  const stateList = idx ? [{ code: 'US', name: 'United States' }, ...idx.states] : [];
  const pos = stateList.findIndex(s => s.code === code);
  const step = (d) => {
    const n = stateList[(pos + d + stateList.length) % stateList.length];
    if (n) setCode(n.code);
  };

  const sd = isUS
    ? (() => {
        const metrics = {};
        idx && idx.metrics.forEach(m => {
          const nat = m.national_id && data[m.national_id];
          if (nat) metrics[m.id] = {
            fred_id: nat.fred_id, latest_value: nat.latest_value,
            latest_date: nat.latest_date, data: nat.data,
          };
        });
        return { name: 'United States', metrics, annual: {} };
      })()
    : ((status === 'ready' && window.STATE_DATA) ? window.STATE_DATA[code] : null);

  const picker = (
    <div className="at-pad" style={{
      background: PAPER, borderBottom: `1px solid rgba(27,42,78,.18)`,
      padding: '16px 56px',
      display: 'flex', alignItems: 'center', gap: 14, flexWrap: 'wrap',
    }}>
      <span style={styles.controlLabel}>State</span>
      <button onClick={() => step(-1)} style={{ ...styles.smallBtn, padding: '8px 10px', fontSize: 12 }}>←</button>
      <select value={code} onChange={(e) => setCode(e.target.value)} style={styles.select}>
        {stateList.map(s => <option key={s.code} value={s.code}>{s.name}</option>)}
      </select>
      <button onClick={() => step(1)} style={{ ...styles.smallBtn, padding: '8px 10px', fontSize: 12 }}>→</button>
      <span style={{
        fontFamily: 'Publico, Georgia, serif', fontSize: 13, fontStyle: 'italic', color: MUTE,
      }}>Pick a state — or United States — to see every metric we track for it.</span>
    </div>
  );

  if (!idx) return null;
  if (status !== 'ready' || !sd) {
    return (
      <React.Fragment>
        {picker}
        <div className="at-pad" style={{ padding: '48px 56px', fontFamily: 'Publico, Georgia, serif', fontStyle: 'italic', color: MUTE }}>
          {status === 'error' ? `Could not load data for ${code}.` : 'Loading state data…'}
        </div>
      </React.Fragment>
    );
  }

  const cards = idx.metrics
    .filter(m => sd.metrics && sd.metrics[m.id])
    .slice()
    .sort((a, b) => a.label.localeCompare(b.label)) // alphabetical (comms request)
    .map(m => {
      const sm = sd.metrics[m.id];
      const coverageNote = sm.coverage && sm.coverage < 1
        ? ` · covers ${(sm.coverage * 100).toFixed(0)}% of renters`
        : '';
      const item = {
        id: `${code.toLowerCase()}_${m.id}`,
        label: m.label,
        eyebrow: sd.name,
        subtitle: `${m.source_label}${coverageNote}`,
        category: 'state',
        units: m.units,
        description: m.description,
        color: m.color,
        fred_id: sm.fred_id,
        source_note: m.source_label,
        source_url: m.source_url,
        rebase: m.rebase,
        invert_color: m.invert_color,
        already_real: ALREADY_REAL_IDS.has(m.id),
        latest_value: sm.latest_value,
        latest_date: sm.latest_date,
        data: sm.data,
      };
      // Build-time national rank (1 = highest value), baked into the payload
      // by fetch_data.R. "Highest" is direction-neutral phrasing: highest
      // rent is bad, highest income is good — the color badges say which.
      const rankNote = sm.rank != null && sm.rank_n != null
        ? `${ordinal(sm.rank)} highest of ${sm.rank_n}` : null;
      const rankText = sm.rank != null && sm.rank_n != null
        ? `the ${ordinal(sm.rank)} highest among ${sm.rank_n} states` : null;
      return { item, factLabel: `${sd.name} — ${m.label}`, rankNote, rankText };
    });

  const annualTiles = (idx.annual || []).filter(a => sd.annual && sd.annual[a.id] != null);

  return (
    <React.Fragment>
      {picker}
      <div className="at-pad" style={{ padding: '36px 56px 56px' }}>
        <div className="at-section-head" style={styles.sectionHead}>
          <span style={styles.sectionLabel}>§01</span>
          <span style={styles.sectionTitle}>{sd.name}</span>
          <span className="at-section-dek" style={styles.sectionDek}>
            {isUS
              ? 'The national versions of every state metric.'
              : 'No state-level CPI exists — these are the price and income series that do.'}
          </span>
        </div>

        <div className="at-cards-grid" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(420px, 1fr))', gap: 0,
          border: `1px solid rgba(27,42,78,.14)` }}>
          {cards.map(({ item, factLabel, rankNote, rankText }, i) => {
            const col = i % 2;
            const row = Math.floor(i / 2);
            const lastRow = Math.floor((cards.length - 1) / 2);
            return (
              <div key={item.id} className="at-card" style={{
                borderRight: col < 1 ? `1px solid rgba(27,42,78,.14)` : 'none',
                borderBottom: row < lastRow ? `1px solid rgba(27,42,78,.14)` : 'none',
              }}>
                <ChartCard item={item} anchorId={anchorId} displayMode={displayMode}
                           priceType={priceType} cpiData={cpiData}
                           factLabel={factLabel}
                           rankNote={rankNote} rankText={rankText} />
              </div>
            );
          })}
        </div>

        {annualTiles.length > 0 && (
          <React.Fragment>
            <div className="at-section-head" style={{ ...styles.sectionHead, marginTop: 48 }}>
              <span style={styles.sectionLabel}>§02</span>
              <span style={styles.sectionTitle}>The annual picture</span>
              <span className="at-section-dek" style={styles.sectionDek}>
                Costs and debt burdens published once a year — context, not live tracking.
              </span>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(240px, 1fr))', gap: 14 }}>
              {annualTiles.map(a => (
                <div key={a.id} style={{
                  background: PAPER, border: `1px solid rgba(27,42,78,.16)`,
                  borderTop: `2px solid ${WARM_RED}`, padding: '16px 18px',
                }}>
                  <div style={{
                    fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
                    fontSize: 10, letterSpacing: '.14em', textTransform: 'uppercase',
                    fontWeight: 700, color: MUTE, marginBottom: 8,
                  }}>{a.label}</div>
                  <div style={{ fontFamily: 'Publico, Georgia, serif', fontSize: 30, fontWeight: 500 }}>
                    {fmtAnnual(sd.annual[a.id], a.units)}
                  </div>
                  <div style={{ fontSize: 11, color: MUTE, marginTop: 6, lineHeight: 1.45 }}>
                    {a.units} · {a.year}<br/>
                    <a href={a.source_url} target="_blank" rel="noopener noreferrer"
                       style={{ color: MUTE, textDecoration: 'underline', textUnderlineOffset: 2 }}>{a.source}</a>
                  </div>
                </div>
              ))}
            </div>
          </React.Fragment>
        )}
      </div>
    </React.Fragment>
  );
}

// ── Compare view: overlay chart(s), pinned states (US pinnable too) ─────────
function CompareChart({ metric, seriesList, anchorId, displayMode, height = 340 }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  const [chartReady, setChartReady] = useState(!!window.Chart);

  useEffect(() => { loadChartJs().then(() => setChartReady(true)); }, []);

  const asPct = metric.rebase || displayMode === 'pct';

  useEffect(() => {
    if (!chartReady || !canvasRef.current) return;
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    const ctx = canvasRef.current.getContext('2d');

    const datasets = seriesList.map(s => {
      const since = anchorDate(anchorId, s.data);
      let vis = sliceFrom(s.data, since);
      if (asPct && vis.length) {
        const v0 = vis[0].value;
        vis = vis.map(d => ({ date: d.date, value: v0 ? (d.value / v0 - 1) * 100 : 0 }));
      }
      return {
        label: s.label,
        data: vis.map(d => ({ x: d.date, y: d.value })),
        borderColor: s.color,
        borderWidth: s.dashed ? 1.6 : 2,
        borderDash: s.dashed ? [5, 4] : undefined,
        pointRadius: 0,
        pointHoverRadius: 4,
        tension: 0.32,
        fill: false,
        clip: false, // endpoint hover circles were half-clipped at the edges
      };
    });

    const displayUnits = asPct ? '%' : metric.units;

    chartRef.current = new window.Chart(ctx, {
      type: 'line',
      data: { datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        layout: { padding: { top: 8, left: 8, right: 8 } },
        animation: { duration: 350, easing: 'easeOutQuart' },
        interaction: { intersect: false, mode: 'index' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: NAVY, titleColor: '#9BA8C2', bodyColor: PAPER,
            borderColor: 'rgba(244,236,216,.15)', borderWidth: 1, padding: 11,
            cornerRadius: 4, displayColors: true, boxWidth: 8, boxHeight: 8,
            titleFont: { size: 10, family: 'Inter Tight, system-ui', weight: '600' },
            bodyFont:  { size: 12, family: 'Inter Tight, system-ui', weight: '600' },
            callbacks: {
              title: (c) => fmtDate(c[0].parsed.x, { year: 'numeric', month: 'long' }),
              label: (c) => ` ${c.dataset.label}: ${fmtVal(c.parsed.y, displayUnits)}`,
            },
          },
        },
        scales: {
          x: {
            type: 'time',
            time: { unit: anchorId === '1y' ? 'month' : 'year' },
            grid: { display: false }, border: { display: false },
            ticks: { color: MUTE, font: { size: 10, family: 'Inter Tight, system-ui' }, maxTicksLimit: 7 },
          },
          y: {
            position: 'right',
            grid: { color: 'rgba(27,42,78,.08)', drawTicks: false },
            border: { display: false },
            ticks: {
              color: MUTE, font: { size: 10, family: 'Inter Tight, system-ui' },
              callback: (v) => fmtVal(v, displayUnits),
            },
          },
        },
      },
    });

    return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
  }, [chartReady, metric, seriesList, anchorId, displayMode]);

  return (
    <div style={{ height, position: 'relative' }}>
      <canvas ref={canvasRef} />
    </div>
  );
}

// ── Choropleth map: one metric, all states ──────────────────────────────────
// D3-geo + topojson-client + the pre-projected us-atlas states topology
// (lazy-loaded from jsDelivr the first time the map is opened). Two color
// modes: change since the active anchor (diverging, red = worse — flipped
// for metrics where rising is good) and latest level (beige → navy).
// `onPick` is optional — when provided, clicking a state pins it.
function USMap({ metric, rows, pinned = [], onPick, anchorPhrase, mapMode }) {
  const [feats, setFeats] = useState(null);
  const [err, setErr] = useState(false);
  const [tip, setTip] = useState(null);
  const boxRef = useRef(null);

  useEffect(() => {
    let live = true;
    loadMapLibs()
      .then(f => { if (live) setFeats(f); })
      .catch(() => { if (live) setErr(true); });
    return () => { live = false; };
  }, []);

  const byCode = useMemo(() => {
    const m = {};
    rows.forEach(r => { m[r.code] = r; });
    return m;
  }, [rows]);

  // Project once per topology load, not per render: geoAlbersUsa at the
  // standard 975×610 layout (composite projection — Alaska/Hawaii insets;
  // territories return no path and are dropped along with non-state ids).
  const shapes = useMemo(() => {
    if (!feats || !window.d3) return null;
    const path = window.d3.geoPath(window.d3.geoAlbersUsa().scale(1300).translate([487.5, 305]));
    return feats
      .map(f => ({ id: f.id, code: FIPS_TO_POSTAL[f.id], d: path(f) }))
      .filter(s => s.code && s.d);
  }, [feats]);

  if (err) {
    return (
      <div style={{
        background: PAPER, border: '1px solid rgba(27,42,78,.18)', padding: '48px 32px',
        textAlign: 'center', fontFamily: 'Publico, Georgia, serif', fontStyle: 'italic', color: MUTE,
      }}>Could not load the map assets (offline?). The Compare States view has the same data.</div>
    );
  }
  if (!feats) {
    return (
      <div style={{ padding: '48px 0', textAlign: 'center', fontFamily: 'Publico, Georgia, serif', fontStyle: 'italic', color: MUTE }}>
        Loading map…
      </div>
    );
  }

  const valOf = (r) => r == null ? null : (mapMode === 'level' ? r.latest : r.change);
  const vals = rows.map(valOf).filter(v => v != null && isFinite(v));
  const NO_DATA = '#E9DFC8';

  // ── Color scales ──────────────────────────────────────────────────────────
  // Perceptual (Lab) ramps with robust quantile domains, replacing the old
  // linear beige lerps. Two problems those had: (1) a single outlier state
  // (usually DC) stretched the min–max domain and washed every other state
  // into the same light end; (2) when every state moved the same direction
  // since the anchor (rents all up since Dec 2019), the zero-centered
  // diverging scale painted the whole country one shade of red. Fixes:
  // domains clamp at the 5th/95th percentile (legend says ≤ / ≥), and change
  // maps only diverge when the data actually has both signs.
  const d3 = window.d3;
  const quant = (arr, p) => arr.length ? d3.quantile(arr, p) : null;
  const clamp01 = (t) => Math.max(0, Math.min(1, t));

  // Level mode: sequential, one hue — light cool tint → brand navy.
  // Direction-neutral on purpose (dark = high, whatever high means).
  const seqRamp = d3.interpolateLab('#E7EAF3', '#16233F');
  let lvlLo = quant(vals, 0.05), lvlHi = quant(vals, 0.95);
  if (!(lvlHi > lvlLo)) { lvlLo = Math.min(...vals); lvlHi = Math.max(...vals); }
  const levelColor = (v) => {
    if (v == null || !isFinite(v)) return NO_DATA;
    const t = lvlHi > lvlLo ? clamp01((v - lvlLo) / (lvlHi - lvlLo)) : 0.5;
    return seqRamp(t);
  };

  // Change mode, mixed signs: diverging red ↔ neutral ↔ blue (never red vs
  // green — that pair collapses for red-green colorblind readers). `flip`
  // handles metrics where rising is good: red is always "getting worse".
  const flip = metric.invert_color ? -1 : 1;
  const MID = '#F0EDE3';
  const badRamp  = d3.interpolateLab(MID, '#A33124'); // deep warm red
  const goodRamp = d3.interpolateLab(MID, '#2F5D96'); // clear blue
  const hasPos = vals.some(v => v > 0), hasNeg = vals.some(v => v < 0);
  const mixedSigns = hasPos && hasNeg;
  const divCap = Math.max(quant(vals.map(Math.abs), 0.95) || 0, 0.1);
  const divergingColor = (v) => {
    if (v == null || !isFinite(v)) return NO_DATA;
    const b = Math.max(-1, Math.min(1, (v * flip) / divCap)); // b > 0 = worse
    return b >= 0 ? badRamp(b) : goodRamp(-b);
  };

  // Change mode, one shared direction: sequential over the actual spread —
  // darker = the bigger move away from zero, red if the shared direction is
  // bad, green if it's good (only one of the two ever appears at a time).
  let chgLo = quant(vals, 0.05), chgHi = quant(vals, 0.95);
  if (!(chgHi > chgLo)) { chgLo = Math.min(...vals); chgHi = Math.max(...vals); }
  const sharedDirBad = hasPos ? flip > 0 : flip < 0;
  const oneSignRamp = sharedDirBad ? badRamp : d3.interpolateLab(MID, '#1E5B41');
  const oneSignColor = (v) => {
    if (v == null || !isFinite(v)) return NO_DATA;
    if (!(chgHi > chgLo)) return oneSignRamp(0.5);
    const t = hasPos ? (v - chgLo) / (chgHi - chgLo) : (v - chgHi) / (chgLo - chgHi);
    return oneSignRamp(clamp01(t));
  };

  const changeColor = mixedSigns ? divergingColor : oneSignColor;
  const fillFor = (v) => mapMode === 'level' ? levelColor(v) : changeColor(v);

  const move = (e, code) => {
    const rect = boxRef.current ? boxRef.current.getBoundingClientRect() : { left: 0, top: 0, width: 0 };
    setTip({ code, x: e.clientX - rect.left, y: e.clientY - rect.top, w: rect.width });
  };

  const tipRow = tip ? byCode[tip.code] : null;

  // Legend: sample the active scale so the bar always matches the map, with
  // ≤ / ≥ end labels because the domain is quantile-clamped.
  const gradFrom = (fn, lo, hi) =>
    `linear-gradient(90deg, ${[0, 0.25, 0.5, 0.75, 1].map(t => fn(lo + t * (hi - lo))).join(', ')})`;
  const pfmt = (x) => `${x < 0 ? '−' : '+'}${Math.abs(x).toFixed(Math.abs(x) < 10 ? 1 : 0)}%`;
  let legendGrad, legendLo, legendHi;
  if (mapMode === 'level') {
    legendGrad = gradFrom(levelColor, lvlLo, lvlHi);
    legendLo = '≤ ' + fmtVal(lvlLo, metric.units);
    legendHi = '≥ ' + fmtVal(lvlHi, metric.units);
  } else if (mixedSigns) {
    legendGrad = gradFrom(changeColor, -divCap, divCap);
    legendLo = '≤ ' + pfmt(-divCap);
    legendHi = '≥ ' + pfmt(divCap);
  } else {
    legendGrad = gradFrom(changeColor, chgLo, chgHi);
    legendLo = '≤ ' + pfmt(chgLo);
    legendHi = '≥ ' + pfmt(chgHi);
  }

  return (
    <div ref={boxRef} style={{ position: 'relative', background: PAPER, border: '1px solid rgba(27,42,78,.18)', padding: '20px 20px 12px' }}>
      <svg viewBox="0 0 975 610" style={{ width: '100%', display: 'block' }}>
        {(shapes || []).map(s => {
          const r = byCode[s.code];
          return (
            <path
              key={s.id}
              d={s.d}
              fill={fillFor(valOf(r))}
              stroke={PAPER}
              strokeWidth="1"
              style={{ cursor: r && onPick ? 'pointer' : 'default' }}
              onClick={() => { if (r && onPick) onPick(s.code); }}
              onMouseMove={(e) => move(e, s.code)}
              onMouseLeave={() => setTip(null)}
            />
          );
        })}
        {/* pinned outlines drawn on top */}
        {(shapes || []).map(s => {
          const pi = pinned.indexOf(s.code);
          if (pi < 0) return null;
          return (
            <path key={'pin' + s.id} d={s.d} fill="none" pointerEvents="none"
                  stroke={PIN_COLORS[pi % PIN_COLORS.length]} strokeWidth="2.5" />
          );
        })}
      </svg>

      {tip && (
        <div style={{
          position: 'absolute',
          left: Math.min(tip.x + 14, (tip.w || 300) - 190), top: tip.y + 14,
          background: NAVY, color: PAPER, padding: '9px 12px', borderRadius: 4,
          pointerEvents: 'none', zIndex: 5, width: 180,
          fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif', fontSize: 12,
          boxShadow: '0 6px 18px rgba(0,0,0,.25)',
        }}>
          <div style={{ fontWeight: 800, marginBottom: 3 }}>{tipRow ? tipRow.name : tip.code}</div>
          {tipRow ? (
            <React.Fragment>
              <div>{tipRow.latest != null ? fmtVal(tipRow.latest, metric.units) : '—'}
                {tipRow.change != null && (
                  <span style={{ color: '#E8C9A8' }}> · {(tipRow.change >= 0 ? '+' : '−') + Math.abs(tipRow.change).toFixed(1)}% {anchorPhrase}</span>
                )}
              </div>
              {tipRow.rank != null && (
                <div style={{ color: '#9BA8C2', marginTop: 2 }}>{ordinal(tipRow.rank)} highest of {tipRow.rankN}</div>
              )}
              {onPick && (
                <div style={{ color: '#9BA8C2', marginTop: 3, fontSize: 10 }}>Click to pin on the chart</div>
              )}
            </React.Fragment>
          ) : (
            <div style={{ color: '#9BA8C2' }}>No data for this state</div>
          )}
        </div>
      )}

      <div style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12, marginTop: 8,
        fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif', fontSize: 10, color: MUTE,
      }}>
        <span style={{ fontStyle: 'italic', fontFamily: 'Publico, Georgia, serif', fontSize: 12 }}>
          {mapMode === 'level' ? `Latest ${metric.label.toLowerCase()}` : `Change ${anchorPhrase}`} · gray = no data
        </span>
        <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <span>{legendLo}</span>
          <span style={{ width: 120, height: 10, background: legendGrad, display: 'inline-block' }} />
          <span>{legendHi}</span>
        </span>
      </div>
    </div>
  );
}

// One overlay-chart panel (US average + pinned states) for one metric. The
// multi-metric compare renders up to four of these side by side; the panel
// reads the already-lazy-loaded window.STATE_METRIC payload.
function CompareMetricPanel({ metric, data, pinned, names, anchorId, displayMode, priceType, cpiData, compact, failed }) {
  const md = window.STATE_METRIC ? window.STATE_METRIC[metric.id] : null;
  const metricReal = priceType === 'real' && isDeflatable({ id: metric.id, units: metric.units });
  const deflate = (arr) => metricReal ? toReal(arr, cpiData) : arr;

  // The US average is not drawn by default — it's pinnable like any state
  // (code 'US' reads the already-loaded national payload).
  const seriesList = [];
  const natItem = metric.national_id && data[metric.national_id];
  if (md) pinned.forEach((code, i) => {
    const s = code === 'US' ? (natItem ? { data: natItem.data } : null) : md.states[code];
    if (s) seriesList.push({ label: names[code] || code, color: PIN_COLORS[i % PIN_COLORS.length], data: deflate(s.data) });
  });

  return (
    <div style={{ background: 'transparent', borderTop: `2px solid ${metric.color}`, padding: '14px 2px 10px', minWidth: 0 }}>
      {compact && (
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: 10, marginBottom: 8 }}>
          <span style={{ fontFamily: 'Publico, Georgia, serif', fontSize: 17, fontWeight: 600, color: INK }}>{metric.label}</span>
          <span style={{
            fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif', fontSize: 10, color: SOFT,
            textTransform: 'uppercase', letterSpacing: '.06em', textAlign: 'right',
          }}>
            {metric.source_url ? (
              <a href={metric.source_url} target="_blank" rel="noopener noreferrer"
                 style={{ color: SOFT, textDecoration: 'none', borderBottom: '1px dotted rgba(27,42,78,.3)' }}>
                {metric.source_label} ↗
              </a>
            ) : metric.source_label} · {metric.frequency}
          </span>
        </div>
      )}
      {failed ? (
        <div style={{ padding: '40px 0', textAlign: 'center', fontFamily: 'Publico, Georgia, serif', fontStyle: 'italic', color: MUTE }}>
          Could not load this metric.
        </div>
      ) : !md ? (
        <div style={{ padding: '40px 0', textAlign: 'center', fontFamily: 'Publico, Georgia, serif', fontStyle: 'italic', color: MUTE }}>
          Loading…
        </div>
      ) : seriesList.length === 0 ? (
        <div style={{ padding: '40px 0', textAlign: 'center', fontFamily: 'Publico, Georgia, serif', fontStyle: 'italic', color: MUTE }}>
          Add a state to draw the comparison.
        </div>
      ) : (
        <CompareChart metric={metric} seriesList={seriesList} anchorId={anchorId}
                      displayMode={displayMode} height={compact ? 250 : 340} />
      )}
    </div>
  );
}

function CompareView({ data, metricIds, setMetricIds, homeState, anchorId, displayMode, priceType }) {
  const idx = window.AFFORDABILITY_STATES;
  const cpiData = data.cpi_all_items ? data.cpi_all_items.data : null;
  const [pinned, setPinned] = useState(() => [homeState].filter(Boolean));
  // Bumped as each state_metrics/{id}.js lands; failures tracked per id.
  const [, setLoadTick] = useState(0);
  const [failedIds, setFailedIds] = useState(() => new Set());

  useEffect(() => {
    let live = true;
    metricIds.forEach(id => {
      loadDataFile(`data/state_metrics/${id}.js`)
        .then(() => { if (live) setLoadTick(t => t + 1); })
        .catch(() => { if (live) setFailedIds(prev => new Set(prev).add(id)); });
    });
    return () => { live = false; };
  }, [metricIds.join(',')]);

  if (!idx) return null;
  // Metric pills are multi-select with no cap: clicking adds a panel,
  // clicking again removes it (the last one can't be removed).
  const metricsSorted = idx.metrics.slice().sort((a, b) => a.label.localeCompare(b.label));
  const metrics = metricIds.map(id => idx.metrics.find(m => m.id === id)).filter(Boolean);
  const metric = metrics[0] || idx.metrics[0];
  const toggleMetric = (id) => {
    if (metricIds.includes(id)) {
      if (metricIds.length > 1) setMetricIds(metricIds.filter(m => m !== id));
    } else {
      setMetricIds([...metricIds, id]);
    }
  };
  const md = window.STATE_METRIC ? window.STATE_METRIC[metric.id] : null;
  const primaryFailed = failedIds.has(metric.id);

  const names = { US: 'United States' };
  idx.states.forEach(s => { names[s.code] = s.name; });

  // No cap on pinned states — pin all 51 if you want. Colors cycle past the
  // palette length; the chips and tooltips still name every line.
  const togglePin = (code) => {
    setPinned(prev => prev.includes(code) ? prev.filter(c => c !== code) : [...prev, code]);
  };

  // "+ Add" dropdown: the US average is just another option, listed first.
  let stateOptions = [];
  if (md) {
    stateOptions = Object.keys(md.states)
      .map(code => ({ code, name: names[code] || code }))
      .sort((a, b) => a.name.localeCompare(b.name));
    if (metric.national_id && data[metric.national_id]) {
      stateOptions.unshift({ code: 'US', name: 'United States' });
    }
  }

  const status = primaryFailed ? 'error' : (md ? 'ready' : 'loading');

  return (
    <React.Fragment>
      {/* Metric picker */}
      <div className="at-pad" style={{
        background: PAPER, borderBottom: `1px solid rgba(27,42,78,.18)`,
        padding: '16px 56px',
        display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap',
      }}>
        <span style={styles.controlLabel}>Metrics</span>
        {metricsSorted.map(m => {
          const on = metricIds.includes(m.id);
          return (
            <button key={m.id} onClick={() => toggleMetric(m.id)}
              title={on ? 'Remove this chart' : 'Add this chart'}
              style={{
                fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
                fontSize: 13, fontWeight: on ? 700 : 600,
                padding: '8px 15px',
                border: `1.5px solid ${on ? NAVY : 'rgba(27,42,78,.22)'}`,
                background: on ? NAVY : 'transparent',
                color: on ? PAPER : INK,
                cursor: 'pointer', borderRadius: 100,
              }}>{on && metricIds.length > 1 ? '✓ ' : ''}{m.label}</button>
          );
        })}
        <span style={{
          fontFamily: 'Publico, Georgia, serif', fontSize: 12.5, fontStyle: 'italic', color: MUTE,
        }}>Pick as many as you want to compare side by side.</span>
      </div>

      <div className="at-pad" style={{ padding: '36px 56px 56px' }}>
        {status !== 'ready' || !md ? (
          <div style={{ padding: '48px 0', fontFamily: 'Publico, Georgia, serif', fontStyle: 'italic', color: MUTE }}>
            {status === 'error' ? 'Could not load this metric.' : 'Loading state data…'}
          </div>
        ) : (
          <React.Fragment>
            <div className="at-section-head" style={styles.sectionHead}>
              <span style={styles.sectionLabel}>§01</span>
              <span style={styles.sectionTitle}>
                {metrics.length === 1 ? `${metric.label} — pick states to overlay` : `${metrics.length} metrics, side by side`}
              </span>
              <span className="at-section-dek" style={styles.sectionDek}>
                {metrics.length === 1 ? (
                  <React.Fragment>
                    {metric.source_url ? (
                      <a href={metric.source_url} target="_blank" rel="noopener noreferrer"
                         style={{ color: MUTE, textDecoration: 'none', borderBottom: '1px dotted rgba(27,42,78,.3)' }}>
                        {metric.source_label} ↗
                      </a>
                    ) : metric.source_label} · {metric.frequency}
                  </React.Fragment>
                ) : 'Same pinned states on every panel.'}
              </span>
            </div>

            {/* Pinned chips + add control */}
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 16 }}>
              {pinned.map((code, i) => (
                <button key={code} onClick={() => togglePin(code)} style={{
                  fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif', fontSize: 12, fontWeight: 700,
                  display: 'inline-flex', alignItems: 'center', gap: 7,
                  padding: '6px 12px', borderRadius: 100, cursor: 'pointer',
                  border: `1.5px solid ${PIN_COLORS[i % PIN_COLORS.length]}`,
                  background: hexToRgba(PIN_COLORS[i % PIN_COLORS.length], 0.09), color: INK,
                }} title="Remove from chart">
                  <span style={{ width: 10, height: 10, borderRadius: 5, background: PIN_COLORS[i % PIN_COLORS.length] }} />
                  {names[code] || code} ✕
                </button>
              ))}
              <select
                value=""
                onChange={(e) => { if (e.target.value) togglePin(e.target.value); }}
                style={{ ...styles.select, padding: '7px 10px', fontSize: 13 }}
              >
                <option value="">+ Add a state…</option>
                {stateOptions.filter(r => !pinned.includes(r.code)).map(r => (
                  <option key={r.code} value={r.code}>{r.name}</option>
                ))}
              </select>
            </div>

            <div style={metrics.length === 1 ? {} : {
              display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(380px, 1fr))', gap: '0 28px',
            }}>
              {metrics.map(m => (
                <CompareMetricPanel key={m.id} metric={m} data={data} pinned={pinned} names={names}
                                    anchorId={anchorId} displayMode={displayMode} priceType={priceType}
                                    cpiData={cpiData} compact={metrics.length > 1}
                                    failed={failedIds.has(m.id)} />
              ))}
            </div>

          </React.Fragment>
        )}
      </div>
    </React.Fragment>
  );
}

// ── Map view: the US choropleth as its own tab, one metric at a time ────────
function MapView({ data, metricId, setMetricId, anchorId, priceType, displayMode }) {
  const idx = window.AFFORDABILITY_STATES;
  const cpiData = data.cpi_all_items ? data.cpi_all_items.data : null;
  const [mapMode, setMapMode] = useState('change'); // 'change' | 'level'
  // Click-to-pin: clicking a state on the map adds it to the overlay chart
  // below (and outlines it on the map); clicking again removes it. Pins
  // survive metric switches so you can walk one set of states across metrics.
  const [pinned, setPinned] = useState([]);
  const togglePin = (code) => {
    setPinned(prev => prev.includes(code) ? prev.filter(c => c !== code) : [...prev, code]);
  };
  const [, setLoadTick] = useState(0);
  const [failedIds, setFailedIds] = useState(() => new Set());

  useEffect(() => {
    let live = true;
    loadDataFile(`data/state_metrics/${metricId}.js`)
      .then(() => { if (live) setLoadTick(t => t + 1); })
      .catch(() => { if (live) setFailedIds(prev => new Set(prev).add(metricId)); });
    return () => { live = false; };
  }, [metricId]);

  if (!idx) return null;
  const metricsSorted = idx.metrics.slice().sort((a, b) => a.label.localeCompare(b.label));
  const metric = idx.metrics.find(m => m.id === metricId) || idx.metrics[0];
  const md = window.STATE_METRIC ? window.STATE_METRIC[metric.id] : null;
  const status = failedIds.has(metric.id) ? 'error' : (md ? 'ready' : 'loading');

  const names = {};
  idx.states.forEach(s => { names[s.code] = s.name; });

  const anchorD = anchorDate(anchorId, null);
  // Deflate dollar/index metrics when the global switch is Real. No state CPI
  // exists, so state values use the national CPI-U — the standard fallback.
  const metricReal = priceType === 'real' && isDeflatable({ id: metric.id, units: metric.units });
  const deflate = (arr) => metricReal ? toReal(arr, cpiData) : arr;

  let rows = [];
  if (md) {
    rows = Object.keys(md.states).map(code => {
      const s = md.states[code];
      const d = deflate(s.data);
      return {
        code,
        name: names[code] || code,
        latest: d.length ? d[d.length - 1].value : s.latest_value,
        change: pctChange(d, anchorId === 'max' ? d[0].date : anchorD),
        rank: s.rank ?? null,     // build-time rank from fetch_data.R
        rankN: s.rank_n ?? null,
      };
    });
    // Client-side fallback ranks (latest value, 1 = highest) for payloads
    // generated before build-time rankings existed.
    const ranked = rows.filter(r => r.latest != null).slice().sort((a, b) => b.latest - a.latest);
    ranked.forEach((r, i) => {
      if (r.rank == null) { r.rank = i + 1; r.rankN = ranked.length; }
      else if (r.rankN == null) { r.rankN = ranked.length; }
    });
  }

  return (
    <React.Fragment>
      {/* Measure picker — single-select: the map shows one metric at a time */}
      <div className="at-pad" style={{
        background: PAPER, borderBottom: `1px solid rgba(27,42,78,.18)`,
        padding: '16px 56px',
        display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap',
      }}>
        <span style={styles.controlLabel}>Measure</span>
        {metricsSorted.map(m => {
          const on = m.id === metric.id;
          return (
            <button key={m.id} onClick={() => setMetricId(m.id)}
              style={{
                fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
                fontSize: 13, fontWeight: on ? 700 : 600,
                padding: '8px 15px',
                border: `1.5px solid ${on ? NAVY : 'rgba(27,42,78,.22)'}`,
                background: on ? NAVY : 'transparent',
                color: on ? PAPER : INK,
                cursor: 'pointer', borderRadius: 100,
              }}>{m.label}</button>
          );
        })}
      </div>

      <div className="at-pad" style={{ padding: '36px 56px 56px' }}>
        {status !== 'ready' || !md ? (
          <div style={{ padding: '48px 0', fontFamily: 'Publico, Georgia, serif', fontStyle: 'italic', color: MUTE }}>
            {status === 'error' ? 'Could not load this metric.' : 'Loading state data…'}
          </div>
        ) : (
          <React.Fragment>
            <div className="at-section-head" style={styles.sectionHead}>
              <span style={styles.sectionLabel}>§01</span>
              <span style={styles.sectionTitle}>All states — {metric.label}</span>
              <span className="at-section-dek" style={styles.sectionDek}>
                {metric.source_url ? (
                  <a href={metric.source_url} target="_blank" rel="noopener noreferrer"
                     style={{ color: MUTE, textDecoration: 'none', borderBottom: '1px dotted rgba(27,42,78,.3)' }}>
                    {metric.source_label} ↗
                  </a>
                ) : metric.source_label} · {metric.frequency} · hover any state, click to pin it on the chart.
              </span>
              <span style={{ display: 'flex', gap: 6, marginLeft: 16, flexWrap: 'wrap' }}>
                <button onClick={() => setMapMode('change')} style={styles.modeBtn(mapMode === 'change')}>Change</button>
                <button onClick={() => setMapMode('level')} style={styles.modeBtn(mapMode === 'level')}>Level</button>
              </span>
            </div>

            <USMap metric={metric} rows={rows} pinned={pinned} onPick={togglePin}
                   anchorPhrase={anchorById(anchorId).phrase} mapMode={mapMode} />

            <div style={{
              marginTop: 14, fontFamily: 'Publico, Georgia, serif', fontStyle: 'italic',
              fontSize: 12.5, color: MUTE,
            }}>
              % change is measured {anchorById(anchorId).phrase}. Ranks are on the latest value (1 = highest — direction-neutral: highest rent is bad, highest income is good).
              {metric.id === 'rent' && ' State rents aggregate Zillow county data with renter-household weights; states where coverage falls below half of renter households are omitted.'}
            </div>

            {/* Click-to-pin overlay chart: every state clicked on the map is
                drawn here; clicking more states keeps adding lines. */}
            <div className="at-section-head" style={{ ...styles.sectionHead, marginTop: 44 }}>
              <span style={styles.sectionLabel}>§02</span>
              <span style={styles.sectionTitle}>
                {pinned.length
                  ? `${metric.label} — ${pinned.length} ${pinned.length === 1 ? 'state' : 'states'} pinned`
                  : 'Pin states to chart them'}
              </span>
              <span className="at-section-dek" style={styles.sectionDek}>
                Click states on the map to add them; click a state or its chip to remove it.
              </span>
            </div>
            {pinned.length === 0 ? (
              <div style={{
                background: PAPER, border: `1px solid rgba(27,42,78,.18)`,
                padding: '36px 32px', textAlign: 'center',
                fontFamily: 'Publico, Georgia, serif', fontStyle: 'italic', color: MUTE,
              }}>
                Click any state on the map above to start a comparison chart.
              </div>
            ) : (
              <React.Fragment>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap', marginBottom: 16 }}>
                  {pinned.map((code, i) => (
                    <button key={code} onClick={() => togglePin(code)} style={{
                      fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif', fontSize: 12, fontWeight: 700,
                      display: 'inline-flex', alignItems: 'center', gap: 7,
                      padding: '6px 12px', borderRadius: 100, cursor: 'pointer',
                      border: `1.5px solid ${PIN_COLORS[i % PIN_COLORS.length]}`,
                      background: hexToRgba(PIN_COLORS[i % PIN_COLORS.length], 0.09), color: INK,
                    }} title="Remove from chart">
                      <span style={{ width: 10, height: 10, borderRadius: 5, background: PIN_COLORS[i % PIN_COLORS.length] }} />
                      {names[code] || code} ✕
                    </button>
                  ))}
                  <button onClick={() => setPinned([])}
                    style={{ ...styles.smallBtn, border: 'none', textDecoration: 'underline', textUnderlineOffset: 3, fontSize: 10 }}
                  >Clear all</button>
                </div>
                <div style={{ background: 'transparent', borderTop: `2px solid ${metric.color}`, padding: '14px 2px 10px' }}>
                  <CompareChart
                    metric={metric}
                    seriesList={pinned.map((code, i) => {
                      const s = md.states[code];
                      if (!s) return null;
                      return { label: names[code] || code, color: PIN_COLORS[i % PIN_COLORS.length], data: deflate(s.data) };
                    }).filter(Boolean)}
                    anchorId={anchorId} displayMode={displayMode} height={340} />
                </div>
              </React.Fragment>
            )}
          </React.Fragment>
        )}
      </div>
    </React.Fragment>
  );
}

// ── Shell ────────────────────────────────────────────────────────────────────
function parseHash() {
  const out = {};
  const h = (window.location.hash || '').replace(/^#/, '');
  h.split('&').forEach(kv => {
    const [k, v] = kv.split('=');
    if (k && v) out[decodeURIComponent(k)] = decodeURIComponent(v);
  });
  return out;
}

function AppMain({ data }) {
  const idx = window.AFFORDABILITY_STATES;
  const hash = useMemo(parseHash, []);
  const realBaseYear = data.cpi_all_items && data.cpi_all_items.data.length
    ? data.cpi_all_items.data[data.cpi_all_items.data.length - 1].date.slice(0, 4) : '';
  const validState = (c) => c === 'US' || (idx && idx.states.some(s => s.code === c));
  const validMetric = (m) => idx && idx.metrics.some(x => x.id === m);

  const [view, setView] = useState(
    ['national', 'state', 'compare', 'map'].includes(hash.view) && (hash.view === 'national' || idx) ? hash.view : 'national');
  const [anchorId, setAnchorId] = useState(ANCHORS.some(a => a.id === hash.anchor) ? hash.anchor : '2019');
  const [displayMode, setDisplayMode] = useState(hash.mode === 'pct' ? 'pct' : 'level');
  const [priceType, setPriceType] = useState(hash.type === 'real' ? 'real' : 'nominal');
  const [stateCode, setStateCode] = useState(validState(hash.state) ? hash.state : 'CA');
  // Compare view supports any number of metrics (comma-separated in the hash).
  const [metricIds, setMetricIds] = useState(() => {
    const fromHash = (hash.metric || '').split(',').filter(validMetric);
    if (fromHash.length) return fromHash;
    return [idx && idx.metrics[0] ? idx.metrics[0].id : 'unemployment'];
  });
  // The Map view shows exactly one metric at a time.
  const [mapMetricId, setMapMetricId] = useState(() => {
    const first = (hash.metric || '').split(',')[0];
    if (hash.view === 'map' && validMetric(first)) return first;
    return idx && idx.metrics[0] ? idx.metrics[0].id : 'unemployment';
  });

  // Deep links: a campaigner can send a colleague straight to their state.
  useEffect(() => {
    const parts = [`view=${view}`, `anchor=${anchorId}`];
    if (displayMode === 'pct') parts.push('mode=pct');
    if (priceType === 'real') parts.push('type=real');
    if (view === 'state') parts.push(`state=${stateCode}`);
    if (view === 'compare') { parts.push(`metric=${metricIds.join(',')}`); }
    if (view === 'map') { parts.push(`metric=${mapMetricId}`); }
    window.history.replaceState(null, '', '#' + parts.join('&'));
  }, [view, anchorId, displayMode, priceType, stateCode, metricIds, mapMetricId]);

  const lastUpdated = (() => {
    const stamps = Object.values(data).map(d => d.last_updated).filter(Boolean).sort();
    return stamps.length ? stamps[stamps.length - 1] : null;
  })();

  const VIEWS = [
    { id: 'national', label: 'National' },
    ...(idx ? [
      { id: 'state',   label: 'My State' },
      { id: 'compare', label: 'Compare States' },
      { id: 'map',     label: 'Map' },
    ] : []),
  ];

  return (
    <div style={styles.root}>
      {/* Top bar */}
      <div className="at-pad" style={styles.topbar}>
        <span>Economic Security Project</span>
        <a href="about.html" style={{
          color: PAPER, textDecoration: 'none',
          borderBottom: '1px dotted rgba(244,236,216,.5)', paddingBottom: 1,
        }}>About the data →</a>
      </div>

      {/* Hero */}
      <header className="at-pad at-hero" style={styles.hero}>
        <div style={styles.kicker}>The Affordability Tracker · {(new Date()).getFullYear()}</div>
        <h1 className="at-h1" style={styles.h1}>What's gotten<br/>more expensive.</h1>
        <p className="at-dek" style={styles.dek}>
          A long, careful look at the federal price data — national and state by state.
          Built for the people who write about it, organize around it, and have to live inside it.
        </p>
        {lastUpdated && (
          <div style={{
            marginTop: 22,
            fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
            fontSize: 12, letterSpacing: '.18em', textTransform: 'uppercase',
            color: 'rgba(244,238,225,.6)', fontWeight: 600,
          }}>
            Last updated · {new Date(lastUpdated + 'T12:00:00').toLocaleDateString('en-US', {
              year: 'numeric', month: 'long', day: 'numeric',
            })}
          </div>
        )}

        {/* View tabs */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap', marginTop: 38 }}>
          {VIEWS.map(v => (
            <button key={v.id} onClick={() => setView(v.id)} style={styles.viewTab(view === v.id)}>
              {v.label}
            </button>
          ))}
        </div>
      </header>

      {/* Global controls: anchor + $/% */}
      <div className="at-pad at-controls" style={styles.controls}>
        <span style={styles.controlLabel}>Measure from</span>
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
          {ANCHORS.map(a => (
            <button key={a.id} onClick={() => setAnchorId(a.id)} style={styles.anchorBtn(a.id === anchorId)}>
              {a.label}
            </button>
          ))}
        </div>
        <span style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 16, flexWrap: 'wrap' }}>
          <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={styles.controlLabel}>Type</span>
            <span style={{ display: 'flex' }}>
              <button onClick={() => setPriceType('nominal')} style={styles.modeBtn(priceType === 'nominal')}>Nominal</button>
              <button onClick={() => setPriceType('real')} style={styles.modeBtn(priceType === 'real')}>Real</button>
            </span>
          </span>
          <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={styles.controlLabel}>View</span>
            <span style={{ display: 'flex' }}>
              <button onClick={() => setDisplayMode('level')} style={styles.modeBtn(displayMode === 'level')}>$ levels</button>
              <button onClick={() => setDisplayMode('pct')} style={styles.modeBtn(displayMode === 'pct')}>% change</button>
            </span>
          </span>
        </span>
      </div>

      {priceType === 'real' && (
        <div className="at-pad" style={{ padding: '10px 56px 0' }}>
          <div style={{ fontFamily: 'Publico, Georgia, serif', fontStyle: 'italic', fontSize: 12.5, color: MUTE }}>
            Real: dollar and price-index series are inflation-adjusted to {realBaseYear} dollars using CPI-U (all items).
            Rates, counts, and already-real series (income) are shown as published. State series use the national CPI-U — no state price index exists.
          </div>
        </div>
      )}

      {view === 'national' && <NationalView data={data} anchorId={anchorId} displayMode={displayMode} priceType={priceType} />}
      {view === 'state'    && <StateView data={data} code={stateCode} setCode={setStateCode}
                                         anchorId={anchorId} displayMode={displayMode} priceType={priceType} />}
      {view === 'compare'  && <CompareView data={data} metricIds={metricIds} setMetricIds={setMetricIds}
                                           homeState={stateCode} anchorId={anchorId} displayMode={displayMode} priceType={priceType} />}
      {view === 'map'      && <MapView data={data} metricId={mapMetricId} setMetricId={setMapMetricId}
                                       anchorId={anchorId} priceType={priceType} displayMode={displayMode} />}

      {/* Footer */}
      <div className="at-pad" style={{ padding: '0 56px 48px' }}>
        <div style={{
          paddingTop: 22, borderTop: `1px solid rgba(27,42,78,.2)`,
          fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
          fontSize: 11, color: MUTE, letterSpacing: '.08em',
          textTransform: 'uppercase',
          display: 'flex', justifyContent: 'space-between', gap: 12, flexWrap: 'wrap',
        }}>
          <a href="about.html" style={{ color: MUTE, textDecoration: 'underline', textUnderlineOffset: 3 }}>
            About the data: sources & methods
          </a>
          <span style={{ textAlign: 'right' }}>
            Data: FRED · BLS · Census · FHFA · Zillow · Freddie Mac · EIA · NY Fed · KFF · Urban · CCAoA<br/>
            economicsecurityproject.org / affordability
          </span>
        </div>
      </div>
    </div>
  );
}

window.AppMain = AppMain;
})();
</script>

<script type="text/babel" data-presets="react">
(function() {
  const { useState, useEffect } = React;

  function App() {
    const data = window.AFFORDABILITY_DATA;
    const [ready, setReady] = useState(!!window.AppMain);
    useEffect(() => {
      if (ready) return;
      const t = setInterval(() => {
        if (window.AppMain) { setReady(true); clearInterval(t); }
      }, 80);
      return () => clearInterval(t);
    }, [ready]);

    if (!data) return <div style={{ color: '#F4ECD8', padding: 40, fontFamily: 'system-ui' }}>No data loaded.</div>;
    if (!ready) return <div style={{ color: '#F4ECD8', padding: 40, fontFamily: 'system-ui' }}>Loading…</div>;

    const Main = window.AppMain;
    return (
      <div id="stage">
        <Main data={data} />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
})();
</script>

</body>
</html>
