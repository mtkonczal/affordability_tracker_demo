<!DOCTYPE html>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Public Sans', system-ui, sans-serif;
    background: #0E1320;
    color: #0E1320;
  }
  [style*="Publico"] { font-family: 'Source Serif 4', Georgia, serif !important; }
  [style*="Neue Haas Grotesk"] { font-family: 'Inter Tight', system-ui, sans-serif !important; }
  #root { display: flex; justify-content: center; min-height: 100vh; background: #0E1320; }
  #stage { background: #F4ECD8; box-shadow: 0 30px 80px rgba(0,0,0,.5); width: 100%; flex-shrink: 0; }

  /* Card grid items must allow shrinking below their min-content so the
     auto-fit minmax() track can actually compress the chart canvas with
     the viewport. Without this, grid items default to min-width: auto
     (≈ min-content) and the chart stops shrinking. */
  .at-card { min-width: 0; }

  /* Responsive overrides — !important is needed because the React tree uses inline styles. */
  @media (max-width: 960px) {
    .at-pad { padding-left: 24px !important; padding-right: 24px !important; }
    .at-card { border-right: none !important; }
    .at-range-row { flex-wrap: wrap !important; }
    .at-heatmap-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .at-heatmap-scroll > div { min-width: 860px; }
    .at-controls { flex-wrap: wrap !important; }
  }
  @media (max-width: 640px) {
    .at-pad { padding-left: 16px !important; padding-right: 16px !important; }
    .at-h1 { font-size: 38px !important; line-height: 1.08 !important; margin-bottom: 20px !important; }
    .at-dek { font-size: 17px !important; }
    .at-hero { padding-top: 40px !important; padding-bottom: 36px !important; }
    .at-section-head { flex-wrap: wrap !important; }
    .at-section-dek { margin-left: 0 !important; flex-basis: 100% !important; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data/app_data.js"></script>
<script src="data/states_index.js"></script>

<script type="text/babel" data-presets="react">
(function() {
// ── Shared utilities ─────────────────────────────────────────────────────────
const ESP = {
  warmNavy:  '#1B2A4E',
  warmRed:   '#E04E39',
  beige:     '#F4ECD8',
  ink:       '#0E1320',
  paper:     '#FBF7EE',
  mute:      '#6B6E78',
  softMute:  '#9A9CA3',
  green:     '#2E7D5B',
};

// Format helpers. Percents get one decimal place (comms request: easier to
// read on charts); dollars keep cents only when small.
function fmtVal(val, units = '') {
  if (units.includes('%')) return val.toFixed(1) + '%';
  if (units.includes('Billions')) return '$' + val.toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + 'B';
  // "Hours of Work" (the derived rent_hours metric) — check before the $
  // branch so it doesn't collide with "$ per Hour".
  if (units.toLowerCase().startsWith('hours')) return val.toFixed(1) + ' hrs';
  if (units.includes('$') || units.toLowerCase().includes('gallon')) {
    return Math.abs(val) >= 1000
      ? '$' + val.toLocaleString(undefined, { maximumFractionDigits: 0 })
      : '$' + val.toFixed(2);
  }
  if (units.includes('Thousands')) return Math.round(val).toLocaleString();
  return val.toFixed(1);
}

// 1 → "1st", 2 → "2nd", 47 → "47th"
function ordinal(n) {
  const s = ['th', 'st', 'nd', 'rd'], v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

// The three message anchors plus a short and a long window. "Pre-pandemic"
// is December 2019, not early 2020 — anchoring at 2020 bakes the COVID
// crash into the baseline (gas cratered in April 2020) and produces
// comparisons that don't survive scrutiny.
const ANCHORS = [
  { id: '1y',   label: '1 Year',         phrase: 'over the past year' },
  { id: '2025', label: 'Since Jan 2025', phrase: 'since Jan 2025' },
  { id: '2019', label: '2019',           phrase: 'since Dec 2019' },
  { id: '2000', label: 'Since 2000',     phrase: 'since 2000' },
  { id: 'max',  label: 'Max',            phrase: 'all-time' },
];
function anchorById(id) { return ANCHORS.find(a => a.id === id) || ANCHORS[1]; }
function anchorDate(id, data) {
  if (id === '1y')  { const d = new Date(); d.setFullYear(d.getFullYear() - 1); return d.toISOString().slice(0, 10); }
  if (id === '2025') return '2025-01-01';
  if (id === '2019') return '2019-12-01';
  if (id === '2000') return '2000-01-01';
  return (data && data.length) ? data[0].date : '1900-01-01';
}

// Render the card to a branded PNG by drawing directly to a canvas.
// We avoid html-to-image / DOM-cloning approaches because they were
// producing blank captures (font fallbacks not surviving the clone,
// data-URL <img> elements not decoding before snapshot, foreignObject
// CORS quirks). Drawing the chart canvas + text on a fresh canvas is
// deterministic and needs no external library.
async function downloadCardAsPNG({
  chartCanvas, item, accent, headlineText, changeText, changeColor, rangeLabel,
}) {
  if (document.fonts && document.fonts.ready) {
    try { await document.fonts.ready; } catch (e) {}
  }

  // 2x for retina-grade output; final PNG is 1440 × 1080.
  const SCALE = 2;
  const W = 1440, H = 1080;
  const canvas = document.createElement('canvas');
  canvas.width  = W * SCALE;
  canvas.height = H * SCALE;
  const ctx = canvas.getContext('2d');
  ctx.scale(SCALE, SCALE);
  ctx.textBaseline = 'alphabetic';

  const PAPER = '#FBF7EE';
  const INK   = '#0E1320';
  const NAVY  = '#1B2A4E';
  const MUTE  = '#6B6E78';
  const SERIF   = '"Source Serif 4", Georgia, serif';
  const DISPLAY = '"Inter Tight", system-ui, sans-serif';

  // Background
  ctx.fillStyle = PAPER;
  ctx.fillRect(0, 0, W, H);

  // ── Header band ─────────────────────────────────────────────────────────
  const padX = 80;

  // Logo box ("E")
  ctx.fillStyle = NAVY;
  ctx.fillRect(padX, 80, 56, 56);
  ctx.fillStyle = PAPER;
  ctx.font = `600 36px ${SERIF}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('E', padX + 28, 80 + 30);
  ctx.textBaseline = 'alphabetic';

  // Brand wordmark
  ctx.textAlign = 'left';
  ctx.fillStyle = NAVY;
  ctx.font = `700 28px ${DISPLAY}`;
  ctx.fillText('Economic Security Project', padX + 76, 110);
  ctx.fillStyle = MUTE;
  ctx.font = `600 14px ${DISPLAY}`;
  ctx.fillText('THE AFFORDABILITY TRACKER', padX + 76, 134);

  // Date (right side)
  ctx.textAlign = 'right';
  ctx.fillStyle = MUTE;
  ctx.font = `600 14px ${DISPLAY}`;
  const today = new Date().toLocaleDateString('en-US', {
    month: 'long', day: 'numeric', year: 'numeric',
  }).toUpperCase();
  ctx.fillText(today, W - padX, 134);

  // Header divider
  ctx.strokeStyle = 'rgba(27,42,78,.18)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(padX, 180);
  ctx.lineTo(W - padX, 180);
  ctx.stroke();

  // ── Card area ───────────────────────────────────────────────────────────
  const cardTop = 220;

  // Top accent bar (brand color of this series)
  ctx.fillStyle = accent;
  ctx.fillRect(padX, cardTop, W - padX * 2, 4);

  // Eyebrow — item.eyebrow (state name) wins over the category label
  const eyebrow = (item.eyebrow || categoryLabel(item.category)).toUpperCase();
  ctx.textAlign = 'left';
  ctx.fillStyle = accent;
  ctx.font = `700 18px ${DISPLAY}`;
  ctx.fillText(eyebrow, padX, cardTop + 50);

  // Title (auto-shrink if it would collide with the right-side headline)
  const headlineRightWidth = (() => {
    ctx.font = `500 76px ${SERIF}`;
    return ctx.measureText(headlineText).width;
  })();
  const titleMaxWidth = (W - padX * 2) - headlineRightWidth - 60;
  let titleSize = 56;
  ctx.fillStyle = INK;
  for (; titleSize >= 32; titleSize -= 2) {
    ctx.font = `500 ${titleSize}px ${SERIF}`;
    if (ctx.measureText(item.label).width <= titleMaxWidth) break;
  }
  ctx.fillText(item.label, padX, cardTop + 110);

  // Subtitle
  if (item.subtitle) {
    ctx.fillStyle = MUTE;
    ctx.font = `italic 22px ${SERIF}`;
    ctx.fillText(item.subtitle, padX, cardTop + 145);
  }

  // Headline value (right side)
  ctx.textAlign = 'right';
  ctx.fillStyle = INK;
  ctx.font = `500 76px ${SERIF}`;
  ctx.fillText(headlineText, W - padX, cardTop + 110);

  // Change line under headline
  ctx.fillStyle = changeColor || accent;
  ctx.font = `700 22px ${DISPLAY}`;
  ctx.fillText(changeText, W - padX, cardTop + 145);

  // ── Chart ───────────────────────────────────────────────────────────────
  if (chartCanvas) {
    let chartUrl = null;
    try { chartUrl = chartCanvas.toDataURL('image/png'); } catch (e) {}
    if (chartUrl) {
      const img = new Image();
      await new Promise((resolve) => {
        img.onload = resolve;
        img.onerror = resolve; // never block the export on a chart fail
        img.src = chartUrl;
      });
      const chartX = padX, chartY = cardTop + 200;
      const chartW = W - padX * 2, chartH = 540;
      ctx.drawImage(img, chartX, chartY, chartW, chartH);
    }
  }

  // ── Footer ──────────────────────────────────────────────────────────────
  const footerY = H - 50;
  ctx.strokeStyle = 'rgba(27,42,78,.12)';
  ctx.beginPath();
  ctx.moveTo(padX, footerY - 28);
  ctx.lineTo(W - padX, footerY - 28);
  ctx.stroke();

  ctx.fillStyle = MUTE;
  ctx.font = `600 13px ${DISPLAY}`;
  ctx.textAlign = 'left';
  ctx.fillText('ECONOMICSECURITYPROJECT.ORG', padX, footerY);
  ctx.textAlign = 'right';
  ctx.fillText(item.fred_id ? `SOURCE · FRED · ${item.fred_id}` : `SOURCE · ${item.source_note || 'DERIVED'}`, W - padX, footerY);

  // Trigger download
  await new Promise((resolve) => {
    canvas.toBlob((blob) => {
      if (!blob) return resolve();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${item.id}-${item.fred_id || 'derived'}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      resolve();
    }, 'image/png');
  });
}

function downloadCSV(item) {
  const header = 'date,value,units\n';
  const units = (item.units || '').replace(/"/g, '""');
  const body = item.data.map(r => `${r.date},${r.value},"${units}"`).join('\n');
  const sourceLine = item.fred_id
    ? `# ${item.label} — FRED ${item.fred_id}\n# Source: https://fred.stlouisfed.org/series/${item.fred_id}\n`
    : `# ${item.label} — ${item.source_note || 'Derived from public data'}\n`;
  const csv = `${sourceLine}${header}${body}\n`;
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${item.id}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function fmtDate(dateInput, opts) {
  // Accept either an ISO date string ("2024-01-15") or a numeric timestamp (ms),
  // since Chart.js tooltip callbacks pass parsed.x as a number.
  const d = typeof dateInput === 'number'
    ? new Date(dateInput)
    : new Date(dateInput + 'T12:00:00');
  return d.toLocaleDateString('en-US', opts || { year: 'numeric', month: 'short' });
}

function pctChange(data, fromDate) {
  // Find value at-or-before fromDate; latest is last
  if (!data || data.length < 2) return null;
  const latest = data[data.length - 1].value;
  const cutoff = new Date(fromDate);
  let prior = null;
  for (let i = 0; i < data.length; i++) {
    if (new Date(data[i].date) <= cutoff) prior = data[i].value;
    else break;
  }
  if (prior == null || prior === 0) return null;
  return ((latest - prior) / prior) * 100;
}

function valueAt(data, dateStr) {
  // Last value on or before dateStr
  if (!data || !data.length) return null;
  const cutoff = new Date(dateStr);
  let v = null;
  for (let i = 0; i < data.length; i++) {
    if (new Date(data[i].date) <= cutoff) v = data[i].value;
    else break;
  }
  return v;
}

function sliceFrom(data, fromDateStr) {
  const cutoff = new Date(fromDateStr);
  return data.filter(d => new Date(d.date) >= cutoff);
}

// Build an SVG line path (used by the compare-view sparklines)
function linePath(points) {
  if (!points.length) return '';
  return points.map((p, i) => (i === 0 ? `M${p.x.toFixed(1)},${p.y.toFixed(1)}` : `L${p.x.toFixed(1)},${p.y.toFixed(1)}`)).join(' ');
}

function toPoints(data, w, h, opts = {}) {
  if (!data || data.length === 0) return [];
  const pad = opts.pad || 3;
  const vals = data.map(d => d.value);
  const min = opts.min ?? Math.min(...vals);
  const max = opts.max ?? Math.max(...vals);
  const range = max - min || 1;
  return data.map((d, i) => ({
    x: (i / (data.length - 1 || 1)) * w,
    y: h - pad - ((d.value - min) / range) * (h - pad * 2),
    v: d.value,
    date: d.date,
  }));
}

// Hours of work needed at avg hourly earnings to afford X
function hoursToAfford(price, wage) {
  if (!wage) return null;
  return price / wage;
}

// Convert a CPI level into a real-dollar price (illustrative anchor)
const REFERENCE_PRICES = {
  // Approx avg US weekly grocery bill for a family of 4 in 2025 ≈ $290 (USDA moderate plan, scaled)
  groceriesWeekly2025: 290,
  // Median US rent 2025 ≈ $1,540
  rentMonthly2025: 1540,
};

// For a CPI series, scale a reference price by the ratio of CPI(date) / CPI(2025-01)
function scaleByCPI(series, date, refPrice, anchorDate = '2025-01-01') {
  const at = valueAt(series, date);
  const anchor = valueAt(series, anchorDate);
  if (!at || !anchor) return null;
  return refPrice * (at / anchor);
}

const CATEGORY_LABELS = {
  labor: 'Work & Wages', daily: 'Daily', groceries: 'Groceries', big: 'Big-ticket',
  debt: 'Debt',
};
function categoryLabel(category) {
  return CATEGORY_LABELS[category] || 'Big-ticket';
}

// Press-release-ready sentence for the "Copy fact" button. Composes the two
// message anchors (Jan 2025 and pre-pandemic) plus the level for dollar
// series, and always names the source.
function buildFactText(item, opts = {}) {
  const name = opts.factLabel || item.label;
  const isDollar = (item.units || '').includes('$') || (item.units || '').toLowerCase().includes('gallon');
  const b25 = pctChange(item.data, '2025-01-01');
  const b19 = pctChange(item.data, '2019-12-01');
  const dir = (v) => v >= 0 ? 'up' : 'down';
  const clauses = [];
  if (b25 != null) clauses.push(`${dir(b25)} ${Math.abs(b25).toFixed(1)}% since January 2025`);
  if (b19 != null) clauses.push(`${dir(b19)} ${Math.abs(b19).toFixed(1)}% since December 2019`);
  const changePart = clauses.length ? ` — ${clauses.join(', ')}` : '';
  const level = isDollar && item.latest_value != null
    ? `${name}: ${fmtVal(item.latest_value, item.units)} (${fmtDate(item.latest_date)})`
    : `${name} (${fmtDate(item.latest_date)})`;
  const src = item.fred_id
    ? `${item.source_note || 'FRED'} series ${item.fred_id}`
    : (item.source_note || 'federal data');
  const realNote = opts.realYear ? ` (inflation-adjusted to ${opts.realYear} dollars, CPI-U)` : '';
  const rankPart = opts.rankText ? ` — ${opts.rankText}` : '';
  return `${level}${changePart}${realNote}${rankPart}. Source: ${src}, via the Economic Security Project Affordability Tracker.`;
}

// Lazy loader for the split state payloads (data/states/*.js and
// data/state_metrics/*.js). Each file assigns into a window global; the
// promise resolving means that global is populated.
const _loadedFiles = {};
function loadDataFile(src) {
  if (!_loadedFiles[src]) {
    _loadedFiles[src] = new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      s.onerror = () => { delete _loadedFiles[src]; reject(new Error('failed to load ' + src)); };
      document.head.appendChild(s);
    });
  }
  return _loadedFiles[src];
}

Object.assign(window, {
  ESP, fmtVal, fmtDate, ordinal, pctChange, valueAt, sliceFrom, downloadCSV, downloadCardAsPNG,
  linePath, toPoints, hoursToAfford, REFERENCE_PRICES, scaleByCPI, categoryLabel,
  ANCHORS, anchorById, anchorDate, buildFactText, loadDataFile,
});

})();
</script>

<script type="text/babel" data-presets="react">
(function() {
// ── Main app ─────────────────────────────────────────────────────────────────
// Four views over the same design language:
//   National        — every national series as selectable chart cards + heatmap
//   My State        — all metrics for one state (US available as an option)
//   Compare States  — 1–4 metrics, pinned states overlaid (US pinnable too)
//   Map             — choropleth of all states, one measure at a time

const { ESP, fmtVal, fmtDate, ordinal, pctChange, valueAt, sliceFrom, downloadCSV, downloadCardAsPNG,
        linePath, toPoints, categoryLabel, hoursToAfford, REFERENCE_PRICES, scaleByCPI,
        ANCHORS, anchorById, anchorDate, buildFactText, loadDataFile } = window;
const { useState, useMemo, useEffect, useRef } = React;

const NAVY = '#1B2A4E';
const WARM_RED = '#E04E39';
const BEIGE = '#F4ECD8';
const PAPER = '#FBF7EE';
const INK = '#0E1320';
const MUTE = '#6B6E78';
const SOFT = '#9A9CA3';

// ── Real (inflation-adjusted) transform ─────────────────────────────────────
// One global Nominal/Real switch drives the whole page. "Real" deflates a
// series by CPI-U (all items) and re-expresses it in the latest month's
// dollars, the standard construction (same as our derived real-wage series):
//   real_t = nominal_t × CPI_latest / CPI_t
// so the newest point is unchanged and earlier points rise into today's
// dollars. Only dollar levels and price *indexes* can be deflated; rates (%),
// durations and counts are already normalized over time, so Real is a no-op for
// them. A few series arrive already inflation-adjusted (Census real income; our
// derived real earnings) — never double-deflate those.
const ALREADY_REAL_IDS = new Set(['income', 'us_median_income', 'real_hourly_earnings']);
function isDeflatable(item) {
  if (!item) return false;
  if (item.already_real || ALREADY_REAL_IDS.has(item.id)) return false;
  const u = item.units || '';
  return u.includes('$') || /^Index/.test(u);
}
function toReal(series, cpi) {
  if (!series || !series.length || !cpi || !cpi.length) return series;
  const cpiLatest = cpi[cpi.length - 1].value;
  const byMonth = {};
  for (const p of cpi) byMonth[p.date.slice(0, 7)] = p.value;
  const deflAt = (date) => {
    const hit = byMonth[date.slice(0, 7)];
    if (hit != null) return hit;
    // nearest CPI observation on or before this date (cpi is sorted ascending)
    let best = null;
    for (const p of cpi) { if (p.date <= date) best = p.value; else break; }
    return best;
  };
  return series
    .map(d => { const c = deflAt(d.date); return c ? { date: d.date, value: d.value * (cpiLatest / c) } : null; })
    .filter(Boolean);
}
// Apply the global price type to a chart item's series, in place of item.data.
// Returns the (possibly deflated) array. `real` is priceType === 'real'.
function seriesForType(item, cpi, real) {
  return (real && isDeflatable(item)) ? toReal(item.data, cpi) : item.data;
}

// Alphabetical by label (comms request); chips within each row are
// alphabetized too, in NationalView.
const CATEGORY_META = [
  { id: 'big',       label: 'Big-ticket' },
  { id: 'daily',     label: 'Daily items' },
  { id: 'debt',      label: 'Debt' },
  { id: 'groceries', label: 'Groceries' },
  { id: 'labor',     label: 'Work & wages' },
];

// State FIPS → postal, for joining us-atlas topojson features to our data.
const FIPS_TO_POSTAL = {
  '01':'AL','02':'AK','04':'AZ','05':'AR','06':'CA','08':'CO','09':'CT','10':'DE',
  '11':'DC','12':'FL','13':'GA','15':'HI','16':'ID','17':'IL','18':'IN','19':'IA',
  '20':'KS','21':'KY','22':'LA','23':'ME','24':'MD','25':'MA','26':'MI','27':'MN',
  '28':'MS','29':'MO','30':'MT','31':'NE','32':'NV','33':'NH','34':'NJ','35':'NM',
  '36':'NY','37':'NC','38':'ND','39':'OH','40':'OK','41':'OR','42':'PA','44':'RI',
  '45':'SC','46':'SD','47':'TN','48':'TX','49':'UT','50':'VT','51':'VA','53':'WA',
  '54':'WV','55':'WI','56':'WY',
};

// Distinct colors assigned to pinned states in the compare view. No hard cap
// on how many states can be pinned — beyond 12 the colors cycle (tooltips and
// chips still name every line).
const PIN_COLORS = ['#E04E39', '#7C3AED', '#0D9488', '#B45309', '#DB2777', '#2563EB',
                    '#059669', '#64748B', '#CA8A04', '#0E7490', '#BE123C', '#4D7C0F'];

// Lazy-load Chart.js + date adapter once
let chartJsPromise = null;
function loadChartJs() {
  if (chartJsPromise) return chartJsPromise;
  chartJsPromise = new Promise((resolve, reject) => {
    if (window.Chart) return resolve(window.Chart);
    const s1 = document.createElement('script');
    s1.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js';
    s1.onload = () => {
      const s2 = document.createElement('script');
      s2.src = 'https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js';
      s2.onload = () => resolve(window.Chart);
      s2.onerror = reject;
      document.head.appendChild(s2);
    };
    s1.onerror = reject;
    document.head.appendChild(s1);
  });
  return chartJsPromise;
}

// Lazy-load the choropleth stack once: the self-contained d3 bundle (the
// standalone d3-geo UMD requires d3-array/internmap loaded separately and
// breaks alone — verified), topojson-client, and the us-atlas states
// topology (raw lon/lat — NOT pre-projected; USMap projects with
// geoAlbersUsa at the standard 975×610 layout). Resolves to GeoJSON features.
let mapLibsPromise = null;
function loadMapLibs() {
  if (mapLibsPromise) return mapLibsPromise;
  const loadScript = (src) => new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
  mapLibsPromise = Promise.all([
    loadScript('https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js'),
    loadScript('https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js'),
  ])
    .then(() => fetch('https://cdn.jsdelivr.net/npm/us-atlas@3.0.1/states-10m.json'))
    .then(r => { if (!r.ok) throw new Error('us-atlas fetch failed'); return r.json(); })
    .then(topo => window.topojson.feature(topo, topo.objects.states).features)
    .catch(err => { mapLibsPromise = null; throw err; });
  return mapLibsPromise;
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Copy-fact button (shared by all cards) ──────────────────────────────────
function CopyFactButton({ item, factLabel, priceType, cpiData, rankText }) {
  const [copied, setCopied] = useState(false);
  return (
    <button
      style={{ ...styles.smallBtn, ...(copied ? { background: '#2E7D5B', border: '1px solid #2E7D5B', color: PAPER } : {}) }}
      title="Copy a press-ready sentence with the latest numbers"
      onClick={async () => {
        // Match the copied sentence to what's on screen: deflate first in real
        // mode so the % changes line up with the chart the reader is seeing.
        const realOn = priceType === 'real' && isDeflatable(item);
        const factItem = realOn ? { ...item, data: toReal(item.data, cpiData) } : item;
        const realYear = realOn && cpiData && cpiData.length ? cpiData[cpiData.length - 1].date.slice(0, 4) : null;
        const text = buildFactText(factItem, { factLabel, realYear, rankText });
        try {
          await navigator.clipboard.writeText(text);
          setCopied(true);
          setTimeout(() => setCopied(false), 1600);
        } catch (e) { window.prompt('Copy this fact:', text); }
      }}
      onMouseEnter={(e) => { if (!copied) { e.currentTarget.style.background = NAVY; e.currentTarget.style.color = PAPER; } }}
      onMouseLeave={(e) => { if (!copied) { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = NAVY; } }}
    >{copied ? '✓ Copied' : 'Copy fact'}</button>
  );
}

// ── Interactive Chart.js card ───────────────────────────────────────────────
// Transparent background, soft area fill, hover tooltip. `overlayItem` draws
// a dashed national-comparison line (used on state cards). `displayMode`
// 'pct' rebases everything to cumulative % change since the anchor.
function ChartCard({ item, anchorId, displayMode, priceType, cpiData, overlayItem, factLabel, rankNote, rankText }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  const cardRef = useRef(null);
  const [chartReady, setChartReady] = useState(!!window.Chart);
  const accent = item.color || WARM_RED;

  // Per-card override of the global anchor; resets when the global changes.
  const [ovr, setOvr] = useState(null);
  useEffect(() => { setOvr(null); }, [anchorId]);
  const activeId = ovr || anchorId;
  const active = anchorById(activeId);
  const cardSince = anchorDate(activeId, item.data);

  // Index series always display as % change; everything else follows the
  // global $/% toggle.
  const asPct = item.rebase || displayMode === 'pct';
  const real = priceType === 'real';
  const srcData = seriesForType(item, cpiData, real);

  const visibleData = sliceFrom(srcData, cardSince);
  const v0 = (asPct && visibleData.length) ? visibleData[0].value : null;
  const toPct = (data, base) => data.map(d => ({ date: d.date, value: base ? (d.value / base - 1) * 100 : 0 }));
  const displayData = asPct ? toPct(visibleData, v0) : visibleData;
  const displayUnits = asPct
    ? `% change since ${fmtDate(visibleData[0]?.date || cardSince, { year: 'numeric', month: 'short' })}`
    : item.units;
  const headlineVal = asPct
    ? (displayData.length ? displayData[displayData.length - 1].value : 0)
    : (visibleData.length ? visibleData[visibleData.length - 1].value : item.latest_value);

  // Optional national overlay, transformed the same way (deflated too in real)
  const overlaySrc = overlayItem ? seriesForType(overlayItem, cpiData, real) : null;
  const overlayVisible = overlaySrc ? sliceFrom(overlaySrc, cardSince) : null;
  const o0 = (asPct && overlayVisible && overlayVisible.length) ? overlayVisible[0].value : null;
  const overlayDisplay = overlayVisible
    ? (asPct ? toPct(overlayVisible, o0) : overlayVisible)
    : null;

  useEffect(() => {
    loadChartJs().then(() => setChartReady(true));
  }, []);

  useEffect(() => {
    if (!chartReady || !canvasRef.current) return;
    if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }

    const ctx = canvasRef.current.getContext('2d');
    const grad = ctx.createLinearGradient(0, 0, 0, 180);
    grad.addColorStop(0, hexToRgba(accent, 0.22));
    grad.addColorStop(0.7, hexToRgba(accent, 0.04));
    grad.addColorStop(1, hexToRgba(accent, 0));

    // Tight, round-numbered y-axis bounds across BOTH datasets. Pick a
    // "nice" step (1/2/5 × 10ⁿ) sized for the data range, then snap min/max
    // to multiples of it.
    const yVals = displayData.map(d => d.value)
      .concat(overlayDisplay ? overlayDisplay.map(d => d.value) : [])
      .filter(v => Number.isFinite(v));
    const dataMin = yVals.length ? Math.min(...yVals) : 0;
    const dataMax = yVals.length ? Math.max(...yVals) : 1;
    const dataRange = (dataMax - dataMin) || Math.max(Math.abs(dataMax), 1);
    const targetTicks = 4;
    const roughStep = dataRange / Math.max(targetTicks - 1, 1);
    const stepExp = Math.floor(Math.log10(roughStep));
    const stepFrac = roughStep / Math.pow(10, stepExp);
    const niceFrac = stepFrac < 1.5 ? 1 : stepFrac < 3 ? 2 : stepFrac < 7 ? 5 : 10;
    const yStep = niceFrac * Math.pow(10, stepExp);
    const yMin = Math.floor(dataMin / yStep) * yStep;
    const yMax = Math.ceil(dataMax / yStep) * yStep;

    const datasets = [{
      label: item.label,
      data: displayData.map(d => ({ x: d.date, y: d.value })),
      borderColor: accent,
      backgroundColor: grad,
      borderWidth: 1.8,
      pointRadius: 0,
      pointHoverRadius: 5,
      pointHoverBackgroundColor: accent,
      pointHoverBorderColor: PAPER,
      pointHoverBorderWidth: 2,
      tension: 0.32,
      fill: 'start',
      // Don't clip to the plot area — hover circles on the first/last points
      // were getting cut in half at the chart edges.
      clip: false,
    }];
    if (overlayDisplay && overlayDisplay.length) {
      datasets.push({
        label: 'US average',
        data: overlayDisplay.map(d => ({ x: d.date, y: d.value })),
        borderColor: hexToRgba(NAVY, 0.65),
        borderWidth: 1.4,
        borderDash: [5, 4],
        pointRadius: 0,
        pointHoverRadius: 4,
        tension: 0.32,
        fill: false,
        clip: false,
      });
    }

    chartRef.current = new window.Chart(ctx, {
      type: 'line',
      data: { datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        // Left/right padding keeps unclipped hover circles on the endpoints
        // from being cut by the canvas boundary.
        layout: { padding: { top: 8, left: 8, right: 8 } },
        animation: { duration: 350, easing: 'easeOutQuart' },
        interaction: { intersect: false, mode: 'index' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: NAVY,
            titleColor: '#9BA8C2',
            bodyColor: PAPER,
            borderColor: 'rgba(244,236,216,.15)',
            borderWidth: 1,
            padding: 11,
            cornerRadius: 4,
            displayColors: false,
            titleFont: { size: 10, family: 'Inter Tight, system-ui', weight: '600' },
            bodyFont:  { size: 13, family: 'Source Serif 4, Georgia, serif', weight: '600' },
            callbacks: {
              title: (c) => fmtDate(c[0].parsed.x, { year: 'numeric', month: 'long' }),
              label: (c) => `  ${datasets.length > 1 ? c.dataset.label + ': ' : ''}` + fmtVal(c.parsed.y, displayUnits),
            },
          },
        },
        scales: {
          x: {
            type: 'time',
            time: { unit: activeId === '1y' ? 'month' : 'year' },
            grid: { display: false },
            border: { display: false },
            ticks: {
              color: MUTE,
              font: { size: 10, family: 'Inter Tight, system-ui' },
              maxTicksLimit: activeId === '1y' ? 6 : 5,
            },
          },
          y: {
            position: 'right',
            min: yMin,
            max: yMax,
            grid: { color: 'rgba(27,42,78,.08)', drawTicks: false },
            border: { display: false },
            ticks: {
              color: MUTE,
              font: { size: 10, family: 'Inter Tight, system-ui' },
              stepSize: yStep,
              callback: (v) => fmtVal(v, displayUnits),
            },
          },
        },
      },
    });

    return () => {
      if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    };
  }, [chartReady, item, cardSince, accent, displayMode, priceType, overlayItem]);

  const change = pctChange(srcData, cardSince);
  const up = change != null && change >= 0;
  const bad = item.invert_color ? !up : up;
  const changeColorFor = (v) => (item.invert_color ? v < 0 : v >= 0) ? WARM_RED : '#2E7D5B';

  // The two message anchors, always visible regardless of the active range
  const b25 = pctChange(srcData, '2025-01-01');
  const b19 = pctChange(srcData, '2019-12-01');
  const badge = (v, lbl) => v == null ? null : (
    <span key={lbl} style={{ whiteSpace: 'nowrap' }}>
      <span style={{ color: MUTE }}>{lbl} </span>
      <span style={{ color: changeColorFor(v), fontWeight: 700 }}>
        {v >= 0 ? '+' : '−'}{Math.abs(v).toFixed(1)}%
      </span>
    </span>
  );

  const headlineText = asPct
    ? (headlineVal >= 0 ? '+' : '') + headlineVal.toFixed(1) + '%'
    : fmtVal(headlineVal, displayUnits);
  const changeText = asPct
    ? (up ? '↑ ' : '↓ ') + active.phrase
    : (up ? '↑ +' : '↓ ') + Math.abs(change || 0).toFixed(1) + '% ' + active.phrase;

  return (
    <div ref={cardRef} style={{
      background: 'transparent',
      borderTop: `2px solid ${accent}`,
      padding: '18px 22px 16px',
      display: 'flex', flexDirection: 'column', gap: 12,
    }}>
      {/* Header */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12 }}>
        <div style={{ minWidth: 0, flex: 1 }}>
          <div style={{
            fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
            fontSize: 10, letterSpacing: '.18em', textTransform: 'uppercase',
            fontWeight: 700, color: accent, marginBottom: 4,
          }}>{item.eyebrow || categoryLabel(item.category)}</div>
          <div style={{
            fontFamily: 'Publico, Georgia, serif',
            fontSize: 20, fontWeight: 500, lineHeight: 1.15, color: INK,
          }}>{item.label}</div>
          <div style={{
            fontSize: 12, color: MUTE, marginTop: 3,
            fontFamily: 'Publico, Georgia, serif', fontStyle: 'italic',
          }}>{item.subtitle}</div>
        </div>
        <div style={{ textAlign: 'right', flexShrink: 0 }}>
          <div style={{
            fontFamily: 'Publico, Georgia, serif',
            fontSize: 28, fontWeight: 500, lineHeight: 1, color: INK,
          }}>{headlineText}</div>
          <div style={{
            fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
            fontSize: 11, fontWeight: 700, marginTop: 6,
            color: bad ? WARM_RED : '#2E7D5B',
          }}>{changeText}</div>
        </div>
      </div>

      {/* Dual anchor badges — the two numbers a press release needs — plus
          the state's national rank when this is a state metric */}
      {(b25 != null || b19 != null || rankNote) && (
        <div style={{
          fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
          fontSize: 11, display: 'flex', gap: 14, flexWrap: 'wrap',
          padding: '7px 10px', background: hexToRgba(NAVY, 0.045),
          border: `1px solid rgba(27,42,78,.08)`, borderRadius: 4,
        }}>
          {badge(b25, "Since Jan '25")}
          {badge(b19, "Since Dec '19")}
          {rankNote && (
            <span style={{ whiteSpace: 'nowrap' }}>
              <span style={{ color: MUTE }}>Rank </span>
              <span style={{ color: NAVY, fontWeight: 700 }}>{rankNote}</span>
            </span>
          )}
        </div>
      )}

      {/* Range buttons */}
      <div className="at-range-row" style={{
        display: 'flex', gap: 4, alignItems: 'center',
        margin: '2px 0 -4px',
      }}>
        {ANCHORS.map(r => {
          const on = r.id === activeId;
          return (
            <button
              key={r.id}
              onClick={() => setOvr(r.id)}
              style={{
                fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
                fontSize: 10, fontWeight: 600, letterSpacing: '.05em',
                background: on ? NAVY : 'transparent',
                color: on ? PAPER : MUTE,
                border: `1px solid ${on ? NAVY : 'rgba(27,42,78,.18)'}`,
                padding: '3px 8px',
                cursor: 'pointer',
                transition: 'all .12s',
              }}
            >{r.label}</button>
          );
        })}
      </div>

      {/* Chart */}
      <div style={{ height: 240, position: 'relative' }}>
        <canvas ref={canvasRef} />
      </div>
      {overlayItem && (
        <div style={{
          fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
          fontSize: 10, color: MUTE, marginTop: -6,
        }}>
          <span style={{ borderBottom: `2px dashed ${hexToRgba(NAVY, 0.65)}`, paddingBottom: 1 }}>– –</span> US average
        </div>
      )}

      {/* Footer */}
      <div style={{
        fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
        fontSize: 9, color: SOFT, letterSpacing: '.1em',
        textTransform: 'uppercase',
        paddingTop: 8, borderTop: `1px solid rgba(27,42,78,.1)`,
        display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12,
      }}>
        {(() => {
          // Every card links back to a source document: the FRED series page
          // when we have a FRED ID, otherwise the series' source_url (KFF,
          // NY Fed, Zillow, Census, EIA — or about.html for derived series).
          const srcUrl = item.fred_id
            ? `https://fred.stlouisfed.org/series/${item.fred_id}`
            : item.source_url;
          const srcLabel = item.fred_id
            ? `Source · FRED · ${item.fred_id}`
            : `Source · ${item.source_note || 'View source'}`;
          return srcUrl ? (
            <a
              href={srcUrl}

        <span style={{ display: 'flex', gap: 8, alignItems: 'center' }} data-export-hide>

          >↓ CSV</button>
          <button
            onClick={async () => {
              const chartCanvas = cardRef.current?.querySelector('canvas');
              const changeColor = bad ? WARM_RED : '#2E7D5B';
              try {
                await downloadCardAsPNG({
                  chartCanvas, item, accent,
                  headlineText, changeText, changeColor, rangeLabel: active.phrase,
                });
              } catch (err) { console.error('PNG export failed', err); }
            }}
            style={styles.smallBtn}
            onMouseEnter={(e) => { e.currentTarget.style.background = NAVY; e.currentTarget.style.color = PAPER; }}
            onMouseLeave={(e) => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = NAVY; }}
          >↓ PNG</button>
        </span>
      </div>
    </div>
  );
}

// ── YoY heatmap with cumulative anchor columns ──────────────────────────────
function Heatmap({ items, priceType, cpiData }) {
  const years = [2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025, 2026];
  const real = priceType === 'real';

  const matrix = items.map(item => {
    const d = seriesForType(item, cpiData, real);
    return {
      item,
      cells: years.map(yr => {
        const cur = valueAt(d, `${yr}-01-15`);
        const prior = valueAt(d, `${yr - 1}-01-15`);
        if (!cur || !prior) return null;
        return ((cur - prior) / prior) * 100;
      }),
      cum19: pctChange(d, '2019-12-01'),
      cum25: pctChange(d, '2025-01-01'),
    };
  });

  const colorScaled = (v, span) => {
    if (v == null) return BEIGE;
    const clamp = Math.max(-span, Math.min(span, v));
    const a = Math.abs(clamp) / span;
    const lerp = (s, e) => Math.round(s + (e - s) * a);
    if (clamp > 0) return `rgb(${lerp(244, 224)},${lerp(236, 78)},${lerp(216, 57)})`;
    return `rgb(${lerp(244, 46)},${lerp(236, 125)},${lerp(216, 91)})`;
  };
  const color = (v) => colorScaled(v, 15);
  // Cumulative columns cover 6+ years of change; a wider clamp keeps them
  // from saturating uniformly red.
  const colorCum = (v) => colorScaled(v, 40);
  const textColor = (v, span = 15) => v == null ? MUTE : (Math.abs(v) > span * 0.47 ? PAPER : INK);

  if (!items.length) {
    return (
      <div style={{
        background: PAPER, border: `1px solid rgba(27,42,78,.18)`,
        padding: '32px', textAlign: 'center',
        fontFamily: 'Publico, Georgia, serif', fontStyle: 'italic', color: MUTE,
      }}>
        Select at least one metric above to see the year-by-year breakdown.
      </div>
    );
  }

  const cumHeader = {
    textAlign: 'center', fontSize: 10, lineHeight: 1.25,
    fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
    fontWeight: 700, color: WARM_RED, padding: '0 0 6px',
    textTransform: 'uppercase', letterSpacing: '.04em',
  };
  const cumCell = { borderLeft: `2px solid ${BEIGE}` };

  return (
    <div style={{ background: PAPER, border: `1px solid rgba(27,42,78,.18)`, padding: '24px' }}>
      <div style={{
        display: 'flex', justifyContent: 'flex-end', alignItems: 'center', gap: 8,
        fontSize: 10, color: MUTE, marginBottom: 14,
        fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif', letterSpacing: '.1em',
      }}>
        <span>−15%</span>
        <div style={{ width: 120, height: 10,
          background: `linear-gradient(90deg, ${color(-15)}, ${color(0)}, ${color(15)})` }} />
        <span>+15%</span>
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: `220px repeat(${years.length}, 1fr) 14px 1.35fr 1.35fr`, gap: 2 }}>
        <div></div>
        {years.map(yr => (
          <div key={yr} style={{
            textAlign: 'center', fontSize: 11,
            fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
            fontWeight: 700, color: INK, padding: '0 0 6px',
          }}>{yr}</div>
        ))}
        <div></div>
        <div style={cumHeader}>Since<br/>Dec '19</div>
        <div style={cumHeader}>Since<br/>Jan '25</div>
        {matrix.map(row => (
          <React.Fragment key={row.item.id}>
            <div style={{
              padding: '12px 8px', fontSize: 13, fontWeight: 600, color: INK,
              fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
            }}>
              {row.item.label}
              <div style={{ fontSize: 10, color: MUTE, fontWeight: 400, marginTop: 2 }}>
                {row.item.subtitle}
              </div>
            </div>
            {row.cells.map((v, i) => (
              <div key={i} style={{
                background: color(v), color: textColor(v),
                padding: '12px 4px', textAlign: 'center',
                fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
                fontSize: 13, fontWeight: 700,
              }}>
                {v == null ? '—' : `${v >= 0 ? '+' : ''}${v.toFixed(1)}`}
              </div>
            ))}
            <div></div>
            {[row.cum19, row.cum25].map((v, i) => (
              <div key={'c' + i} style={{
                background: colorCum(v), color: textColor(v, 40),
                padding: '12px 4px', textAlign: 'center',
                fontFamily: '"Neue Haas Grotesk Display Pro", sans-serif',
                fontSize: 13, fontWeight: 700, ...cumCell,
              }}>
                {v == null ? '—' : `${v >= 0 ? '+' : ''}${v.toFixed(1)}%`}
              </div>
            ))}
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

// ── Hours to afford ─────────────────────────────────────────────────────────
function HoursToAfford({ data }) {
  const wageItem = data.hourly_earnings;
  if (!wageItem) return null;
  const wage = wageItem.latest_value;
  const asOf = wageItem.latest_date;

  const rows = [
    data.groceries && {

  if (!rows.length) return null;
