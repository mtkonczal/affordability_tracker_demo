name: Update affordability data

on:
  schedule:
    # ~9am ET on the 1st of each month. Note: CPI and BLS average prices
    # release mid-month, so this publishes the prior print; add a second
    # date (e.g. '0 13 1,15 * *') if you want CPI day picked up quickly.
    - cron: '0 13 1 * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
          use-public-rspm: true

      - name: Install R dependencies
        run: Rscript -e 'install.packages("jsonlite", repos = "https://cran.r-project.org/")'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # KFF ACA premium + uninsured rate. KFF updates roughly yearly, but
      # running monthly is idempotent and picks up new years automatically.
      # Non-blocking: if KFF changes its page layout, fetch_data.R still reads
      # the last-good data/kff/*.csv, so the monthly CPI refresh never breaks.
      - name: Refresh KFF annual series (non-blocking)
        continue-on-error: true
        run: python3 scripts/fetch_kff.py

      - name: Fetch data
        env:
          BLS_KEY: ${{ secrets.BLS_KEY }}
          # Required: county renter-household weights for the ZORI state-rent
          # aggregation (free key: https://api.census.gov/data/key_signup.html)
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
          # Optional: state electricity bills (free key: https://www.eia.gov/opendata/).
          # The script skips that metric, without failing, when unset.
          EIA_KEY: ${{ secrets.EIA_KEY }}
        run: Rscript fetch_data.R

      - name: Commit and push if data changed
        run: |
          git config user.name "affordability-tracker-bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "Automated data refresh: $(date -u +%Y-%m-%d)"
            git push
          fi
