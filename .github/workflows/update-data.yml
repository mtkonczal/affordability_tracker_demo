name: Update affordability data

on:
  schedule:
    # ~9am ET on the 2nd and 16th of each month — a day or two after most
    # CPI releases, so the tracker picks up the new print quickly.
    - cron: '0 13 2,16 * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'
          use-public-rspm: true

      - name: Install R dependencies
        run: Rscript -e 'install.packages("jsonlite", repos = "https://cran.r-project.org/")'

      - name: Fetch data
        env:
          BLS_KEY: ${{ secrets.BLS_KEY }}
        run: Rscript fetch_data.R

      - name: Commit and push if data changed
        run: |
          git config user.name "affordability-tracker-bot"
          git config user.email "actions@github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "Automated data refresh: $(date -u +%Y-%m-%d)"
            git push
          fi
